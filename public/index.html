              </div>

              {/* ── Sources strip ── */}
              <div style={{marginBottom:20, padding:'12px 14px', borderRadius:10, border:'1px solid #EDEAF4', background:'#F7F6FA'}}>
                <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom: (selectedLec.files||[]).length > 0 ? 10 : 0}}>
                  <p style={{fontSize:10, fontWeight:700, color:'#9991BF', textTransform:'uppercase', letterSpacing:'0.06em', margin:0}}>Sources</p>
                  <label style={{fontSize:11, fontWeight:600, color:'#EB7100', cursor:'pointer', display:'flex', alignItems:'center', gap:4}}>
                    <input ref={addMoreSourcesRef} type="file" multiple accept=".pdf,.txt,.png,.jpg,.jpeg,.mp3,.wav,.m4a"
                      style={{display:'none'}} onChange={handleAddSources} />
                    + Upload more
                  </label>
                </div>
                {(selectedLec.files||[]).length > 0 ? (
                  <div style={{display:'flex', flexWrap:'wrap', gap:6}}>
                    {(selectedLec.files||[]).map(f => (
                      <div key={f.id} style={{display:'inline-flex', alignItems:'center', gap:6, padding:'4px 8px 4px 10px',
                        borderRadius:20, background:'white', border:'1px solid #EDEAF4', maxWidth:220}}>
                        <span style={{fontSize:12, flexShrink:0}}>{SG_ICONS[f.type]||'📎'}</span>
                        <span style={{fontSize:11, color:'#302C41', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', flex:1}}>{f.name}</span>
                        <button onClick={() => setLectures(prev => prev.map(l => l.id === selectedLec.id
                            ? {...l, files:(l.files||[]).filter(x => x.id !== f.id)} : l))}
                          style={{flexShrink:0, fontSize:11, color:'#9991BF', background:'none', border:'none',
                            cursor:'pointer', padding:'0 2px', lineHeight:1, fontWeight:600}}
                          title="Remove source">✕</button>
                      </div>
                    ))}
                  </div>
                ) : (
                  <p style={{fontSize:12, color:'#9991BF', margin:0}}>No sources. <label style={{color:'#EB7100', cursor:'pointer', fontWeight:600}}>Upload one<input ref={addMoreSourcesRef} type="file" multiple accept=".pdf,.txt,.png,.jpg,.jpeg,.mp3,.wav,.m4a" style={{display:'none'}} onChange={handleAddSources} /></label></p>
                )}
              </div>

              {/* Underline tab bar: Key Concepts | Practice | Flashcards | Review */}
              <div style={{display:'flex', gap:20, borderBottom:'1.5px solid #EDEAF4', marginBottom:24}}>
                {[['summary','📖 Key Concepts'],['quiz','✏️ Practice'],['flashcard','⚡ Flashcards'],['review','🔄 Review']].map(([m, lbl]) => (
                  <button key={m} onClick={() => setMode(m)}
                    style={{paddingBottom:10, fontSize:13, fontWeight:600, border:'none', background:'transparent',
                      color: mode===m?'#EB7100':'#9991BF',
                      borderBottom: mode===m?'2px solid #EB7100':'2px solid transparent',
                      marginBottom:-1.5, cursor:'pointer', transition:'color 0.15s', whiteSpace:'nowrap'}}>
                    {lbl}
                  </button>
                ))}
              </div>

              {/* ── Key Concepts ── */}
              {mode === 'summary' && selectedLec.guide && (
                <div style={{display:'flex', flexDirection:'column', gap:12}}>
                  {selectedLec.guide.topics.map((t, ti) => {
                    const done = selectedLec.understood[ti];
                    return (
                      <div key={ti} style={{borderRadius:12, border:`1.5px solid ${done?'#bbf7d0':'#EDEAF4'}`, overflow:'hidden', transition:'border-color 0.2s'}}>
                        <div style={{padding:'12px 16px', display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:12, background: done?'#f0fdf4':'#FFF3E8'}}>
                          <div style={{flex:1}}>
                            <h4 style={{fontSize:13, fontWeight:700, color: done?'#166534':'#9a3412', marginBottom:4}}>{t.name}</h4>
                            <p style={{fontSize:12, color: done?'#16a34a':'#c2410c', lineHeight:1.5}}>{t.summary}</p>
                          </div>
                          <button onClick={() => setLectures(p => p.map(l => l.id===selectedLec.id ? {...l, understood:{...l.understood,[ti]:!done}} : l))}
                            style={{flexShrink:0, fontSize:11, padding:'4px 10px', borderRadius:20, fontWeight:600, cursor:'pointer', transition:'all 0.15s',
                              background: done?'#dcfce7':'white', color: done?'#166534':'#9991BF', border: done?'1px solid #bbf7d0':'1px solid #EDEAF4'}}>
                            {done?'✓ Done':'Mark done'}
                          </button>
                        </div>
                        <ul style={{padding:'12px 16px', margin:0, listStyle:'none', display:'flex', flexDirection:'column', gap:8}}>
                          {t.concepts.map((c, ci) => (
                            <li key={ci} style={{display:'flex', alignItems:'flex-start', gap:8, fontSize:13, color:'#302C41'}}>
                              <span style={{color:'#EB7100', flexShrink:0, marginTop:2}}>▸</span>{c}
                            </li>
                          ))}
                        </ul>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* ── Practice ── */}
              {mode === 'quiz' && (
                <div>
                  {!selectedLec.quiz && !selectedLec.quizLoading && (
                    <div style={{textAlign:'center', paddingTop:48}}>
                      <div style={{fontSize:36, marginBottom:12}}>✏️</div>
                      <p style={{fontSize:13, color:'#9991BF', marginBottom:20}}>Test your knowledge of <strong style={{color:'#302C41'}}>{selectedLec.label}</strong></p>
                      <button onClick={() => generateQuiz(selectedLec.id)} className="btn-primary">Generate Practice Quiz</button>
                    </div>
                  )}
                  {selectedLec.quizLoading && (
                    <div style={{display:'flex', alignItems:'center', justifyContent:'center', gap:12, paddingTop:48, fontSize:13, color:'#9991BF'}}>
                      <Spinner size={20} /> Building your practice quiz…
                    </div>
                  )}
                  {selectedLec.quiz && !selectedLec.quizLoading && (
                    <QuizUI quiz={selectedLec.quiz} answers={selectedLec.quizAnswers} submitted={selectedLec.quizSubmitted}
                      onAnswer={(qi, oi) => setLectures(p => p.map(l => { if (l.id!==selectedLec.id) return l; const a=[...l.quizAnswers]; a[qi]=oi; return {...l, quizAnswers:a}; }))}
                      onSubmit={() => setLectures(p => p.map(l => l.id===selectedLec.id ? {...l, quizSubmitted:true} : l))}
                      onReset={() => setLectures(p => p.map(l => l.id===selectedLec.id ? {...l, quizAnswers:new Array(l.quiz.questions.length).fill(null), quizSubmitted:false} : l))} />
                  )}
                </div>
              )}

              {/* ── Flashcards ── */}
              {mode === 'flashcard' && (
                <div>
                  {activeDeck.length === 0 ? (
                    <div style={{textAlign:'center', padding:'48px 0'}}>
                      <div style={{fontSize:36, marginBottom:12}}>{generating?'⏳':'🃏'}</div>
                      <p style={{fontSize:13, color:'#9991BF'}}>{generating?'Flashcards will appear shortly…':'No flashcards available for this lecture'}</p>
                    </div>
                  ) : deckDone ? (
                    <div style={{textAlign:'center', padding:'48px 0'}}>
                      <div style={{fontSize:40, marginBottom:12}}>🎉</div>
                      <h3 style={{fontSize:16, fontWeight:700, color:'#302C41', marginBottom:4}}>Deck complete!</h3>
                      <p style={{fontSize:13, color:'#9991BF', marginBottom:20}}>{gotIt.size} understood · {reviewAgain.size} to review</p>
                      <div style={{display:'flex', justifyContent:'center', gap:12}}>
                        {reviewAgain.size > 0 && (
                          <button onClick={() => {
                            const toReview = activeDeck.filter(c => reviewAgain.has(c.id));
                            setDeck(prev => { const rest=prev.filter(c=>!activeDeck.find(a=>a.id===c.id)); return [...rest,...toReview]; });
                            setCardIdx(0); setFlipped(false); setGotIt(new Set()); setReviewAgain(new Set()); setDeckDone(false);
                          }} className="btn-primary">↻ Review {reviewAgain.size} again</button>
                        )}
                        <button onClick={() => { setCardIdx(0); setFlipped(false); setGotIt(new Set()); setReviewAgain(new Set()); setDeckDone(false); }}
                          className="btn-secondary">Start over</button>
                      </div>
                    </div>
                  ) : (() => {
                    const card = activeDeck[cardIdx];
                    if (!card) return null;
                    return (
                      <div>
                        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8}}>
                          <p style={{fontSize:12, color:'#9991BF'}}>{cardIdx+1} / {activeDeck.length} cards</p>
                          <div style={{display:'flex', gap:12, fontSize:12}}>
                            <span style={{color:'#22c55e', fontWeight:600}}>✓ {gotIt.size} got it</span>
                            <span style={{color:'#f59e0b', fontWeight:600}}>↻ {reviewAgain.size} to review</span>
                          </div>
                        </div>
                        <div style={{height:4, borderRadius:2, background:'#EDEAF4', overflow:'hidden', marginBottom:20}}>
                          <div style={{height:'100%', borderRadius:2, background:'#EB7100', width:`${(cardIdx/activeDeck.length)*100}%`, transition:'width 0.3s ease'}}></div>
                        </div>
                        <div onClick={() => setFlipped(f=>!f)}
                          style={{borderRadius:16, border:'1.5px solid #EDEAF4', padding:'36px 32px', cursor:'pointer', minHeight:240, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', textAlign:'center', background:'white', transition:'box-shadow 0.15s'}}
                          onMouseEnter={e=>e.currentTarget.style.boxShadow='0 4px 20px rgba(48,44,65,0.08)'}
                          onMouseLeave={e=>e.currentTarget.style.boxShadow='none'}>
                          {!flipped ? (
                            <div className="fade-in">
                              <p style={{fontSize:11, fontWeight:700, color:'#EB7100', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:16}}>{card.lecLabel}</p>
                              <h3 style={{fontSize:22, fontWeight:700, color:'#302C41', marginBottom:16}}>{card.topicName}</h3>
                              <p style={{fontSize:13, color:'#9991BF'}}>tap to reveal →</p>
                            </div>
                          ) : (
                            <div className="fade-in" style={{width:'100%', textAlign:'left'}}>
                              <p style={{fontSize:11, fontWeight:700, color:'#EB7100', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:8}}>{card.topicName}</p>
                              <p style={{fontSize:13, color:'#6b7280', lineHeight:1.6, marginBottom:16}}>{card.summary}</p>
                              <ul style={{listStyle:'none', padding:0, margin:0, display:'flex', flexDirection:'column', gap:8}}>
                                {card.concepts.map((c, i) => (
                                  <li key={i} style={{display:'flex', alignItems:'flex-start', gap:8, fontSize:13, color:'#302C41'}}>
                                    <span style={{color:'#EB7100', flexShrink:0, marginTop:2}}>▸</span>{c}
                                  </li>
                                ))}
                              </ul>
                            </div>
                          )}
                        </div>
                        {flipped && (
                          <div style={{display:'flex', gap:12, marginTop:16}} className="fade-in">
                            <button onClick={() => markCard(false)}
                              style={{flex:1, padding:'13px 0', fontWeight:600, fontSize:13, borderRadius:12, border:'1.5px solid #D5D1E6', background:'#F7F6FA', color:'#302C41', cursor:'pointer'}}>
                              ↩ Review again
                            </button>
                            <button onClick={() => markCard(true)}
                              style={{flex:1, padding:'13px 0', fontWeight:600, fontSize:13, borderRadius:12, border:'none', background:'#EB7100', color:'white', cursor:'pointer'}}>
                              Got it ✓
                            </button>
                          </div>
                        )}
                      </div>
                    );
                  })()}
                </div>
              )}

              {/* ── Review (concepts to revisit based on wrong quiz answers) ── */}
              {mode === 'review' && (
                <div>
                  {reviewTopics.length === 0 ? (
                    <div style={{textAlign:'center', padding:'48px 0'}}>
                      <div style={{fontSize:36, marginBottom:12}}>🎯</div>
                      <p style={{fontSize:13, color:'#302C41', fontWeight:600, marginBottom:6}}>Nothing to review yet!</p>
                      <p style={{fontSize:12, color:'#9991BF'}}>Take the Practice quiz to see which concepts you should revisit here.</p>
                    </div>
                  ) : (
                    <div>
                      <p style={{fontSize:12, color:'#9991BF', marginBottom:16}}>
                        Based on your quiz results, focus on these {reviewTopics.length} concept{reviewTopics.length!==1?'s':''}:
                      </p>
                      <div style={{display:'flex', flexDirection:'column', gap:12}}>
                        {reviewTopics.map((r, i) => (
                          <div key={i} style={{borderRadius:12, border:'1.5px solid #fee2e2', padding:'14px 16px', background:'#fff5f5'}}>
                            <div style={{display:'flex', alignItems:'flex-start', gap:10}}>
                              <span style={{fontSize:16, flexShrink:0}}>❌</span>
                              <div style={{flex:1}}>
                                <p style={{fontSize:13, fontWeight:700, color:'#991b1b', marginBottom:4}}>{r.topic}</p>
                                <p style={{fontSize:12, color:'#7f1d1d', marginBottom:8}}>{r.question}</p>
                                <div style={{background:'#dcfce7', borderRadius:8, padding:'8px 12px'}}>
                                  <p style={{fontSize:12, fontWeight:600, color:'#166534', marginBottom:2}}>✅ Correct answer</p>
                                  <p style={{fontSize:12, color:'#166534'}}>{r.correctAnswer}</p>
                                </div>
                                {r.explanation && <p style={{fontSize:11, color:'#6b7280', marginTop:8, lineHeight:1.5}}>{r.explanation}</p>}
                                <p style={{fontSize:11, color:'#9991BF', marginTop:4}}>From: {r.lecLabel}</p>
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              )}

            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
function Sidebar({ view, setView, profile, onReset }) {
  const items = [
    { id: 'dashboard', icon: '🏠', label: 'Dashboard' },
    { id: 'finals', icon: '🎯', label: 'Finals Prep' },
  ];
  const initial = (profile?.name || 'S')[0].toUpperCase();
  return (
    <div className="sidebar w-56 flex-shrink-0 p-4 flex flex-col" style={{ minHeight: '100vh' }}>
      <div className="flex items-center gap-2 px-3 py-3 mb-6">
        <div className="w-8 h-8 rounded-xl flex items-center justify-center text-base flex-shrink-0" style={{ background: '#EB7100' }}>🎓</div>
        <div>
          <div className="text-white font-bold text-sm" style={{ letterSpacing: '-0.2px' }}>Finals Coach</div>
          <div className="text-xs" style={{ color: 'rgba(255,255,255,0.45)' }}>{profile?.university?.split(' ')[0] || 'Campus'} · {profile?.year || 'Student'}</div>
        </div>
      </div>
      <nav className="space-y-1">
        {items.map(it => (
          <button key={it.id} onClick={() => setView(it.id)}
            className={`nav-item w-full flex items-center gap-3 px-3 py-2.5 text-left ${view === it.id ? 'active' : ''}`}>
            <span className="text-base">{it.icon}</span>
            <span className="text-sm font-medium" style={{ color: view === it.id ? '#fff' : 'rgba(255,255,255,0.6)' }}>{it.label}</span>
            {it.id === 'finals' && <span className="ml-auto w-2 h-2 bg-red-400 rounded-full pulse-dot flex-shrink-0"></span>}
          </button>
        ))}
      </nav>
      <div className="mt-auto pt-4" style={{ borderTop: '1px solid rgba(255,255,255,0.08)' }}>
        <div className="flex items-center gap-2 px-3 py-2">
          <div className="w-7 h-7 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style={{ background: '#EB7100' }}>{initial}</div>
          <div className="min-w-0">
            <div className="text-white text-xs font-semibold truncate">{profile?.name || 'Student'}</div>
            <div className="text-xs truncate" style={{ color: 'rgba(255,255,255,0.45)' }}>{profile?.major || 'Undeclared'}{profile?.minor ? ` · ${profile.minor}` : ''}</div>
          </div>
        </div>
        <button onClick={onReset}
          style={{ width:'100%', marginTop:4, padding:'5px 12px', background:'none', border:'none',
            color:'rgba(255,255,255,0.25)', fontSize:11, cursor:'pointer', textAlign:'left', borderRadius:6 }}
          onMouseEnter={e => e.currentTarget.style.color='rgba(255,255,255,0.55)'}
          onMouseLeave={e => e.currentTarget.style.color='rgba(255,255,255,0.25)'}>
          ↺ Start fresh
        </button>
      </div>
    </div>
  );
}

// ─── LOCALSTORAGE HELPERS ─────────────────────────────────────────────────────
const LS = {
  get: (key, fallback) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; } },
  set: (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) { console.warn('localStorage save failed:', e); } },
  clear: (...keys) => keys.forEach(k => { try { localStorage.removeItem(k); } catch {} }),
};

// Strip file content from lectures before persisting (base64 data would blow localStorage quota)
const stripFiles = (sgMap) => {
  const out = {};
  for (const [cid, lecs] of Object.entries(sgMap)) {
    out[cid] = lecs.map(({ files: _f, ...rest }) => rest);
  }
  return out;
};

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [apiKey] = useState('__server__'); // always use server-side key on Vercel
  const [profile, setProfile] = useState(() => LS.get('ca_profile', null));
  const [courses, setCourses] = useState(() => {
    const saved = LS.get('ca_courses', null);
    return saved !== null ? saved : [];
  });
  const [sgLecturesByC, setSgLecturesByC] = useState(() => LS.get('ca_sg', {}));
  const [view, setView] = useState('dashboard');
  const [focusCourse, setFocusCourse] = useState(null);
  const [pendingStudyFiles, setPendingStudyFiles] = useState(null); // null=no auto-gen; []=auto-gen from course info; [File,...]=auto-gen from files
  // 'courseSetup' | null (null = main app)
  const [setupPhase, setSetupPhase] = useState(() => {
    const done = LS.get('ca_setup_done', false) || LS.get('ca_profile', null) !== null || LS.get('ca_courses', null) !== null;
    return done ? null : 'courseSetup';
  });

  useEffect(() => { if (profile) LS.set('ca_profile', profile); }, [profile]);
  useEffect(() => { LS.set('ca_courses', courses); }, [courses]);
  useEffect(() => {
    if (Object.keys(sgLecturesByC).length > 0) LS.set('ca_sg', stripFiles(sgLecturesByC));
  }, [sgLecturesByC]);

  const handleSetupComplete = (userCourses, afterView = 'dashboard', rawFiles = null) => {
    if (userCourses && userCourses.length > 0) {
      setCourses(userCourses);
      LS.set('ca_courses', userCourses);
    } else {
      setCourses([]);
      LS.set('ca_courses', []);
    }
    LS.set('ca_setup_done', true);
    setSetupPhase(null);
    if (afterView === 'finals') {
      const firstCourse = userCourses?.[0];
      if (firstCourse) {
        setView('finals');
        setFocusCourse(firstCourse);
        setPendingStudyFiles(rawFiles ?? []);
      }
    }
  };

  const navigate = (v, course = null) => {
    setView(v);
    if (v === 'finals' && course) setFocusCourse(course);
    else setFocusCourse(null);
  };

  const resetAll = () => {
    if (!window.confirm('This will clear all your data and start fresh. Continue?')) return;
    LS.clear('ca_profile', 'ca_courses', 'ca_sg', 'ca_setup_done');
    setProfile(null);
    setCourses([]);
    setSgLecturesByC({});
    setView('dashboard');
    setSetupPhase('courseSetup');
  };

  if (setupPhase === 'landing') return <LandingPage onGetStarted={() => setSetupPhase('courseSetup')} />; {/* kept but never reached */}
  if (setupPhase === 'courseSetup') return (
    <CourseSetupPage
      apiKey={apiKey}
      initialCourses={courses.length > 0 ? courses : null}
      onComplete={handleSetupComplete}
    />
  );

  return (
    <div className="flex" style={{ minHeight: '100vh' }}>
      <Sidebar view={view} setView={(v) => navigate(v)} profile={profile} onReset={resetAll} />
      <main className="flex-1 p-6 scrollable" style={{ maxHeight: '100vh', overflowY: 'auto', background: '#F7F6FA' }}>
        <div style={{ maxWidth: 1200 }}>
          {view === 'dashboard' && (
            <Dashboard
              courses={courses}
              setCourses={setCourses}
              onNavigate={navigate}
              profile={profile}
              setProfile={setProfile}
              sgLecturesByC={sgLecturesByC}
              onGoToCourseSetup={() => setSetupPhase('courseSetup')}
            />
          )}
          {view === 'finals' && (
            <FinalsPrep
              courses={courses}
              setCourses={setCourses}
              apiKey={apiKey}
              focusCourse={focusCourse}
              profile={profile}
              onNavigate={navigate}
              sgLecturesByC={sgLecturesByC}
              setSgLecturesByC={setSgLecturesByC}
              seedRawFiles={pendingStudyFiles}
              onSeedConsumed={() => setPendingStudyFiles(null)}
            />
          )}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
