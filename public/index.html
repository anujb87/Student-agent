const { useState, useEffect, useRef, useCallback } = React;

// ─── DATA ────────────────────────────────────────────────────────────────────
const TODAY = new Date('2026-04-21');
const daysUntil = (dateStr) => {
  if (!dateStr) return 999;
  const d = new Date(dateStr + 'T12:00:00');
  return Math.ceil((d - TODAY) / (1000 * 60 * 60 * 24));
};

// Priority score: higher = needs more attention
// Formula: finalWeight × (100 - currentGrade) × (1 / daysUntil) × 100
const priorityScore = (c) => {
  const d = daysUntil(c.finalDate);
  if (d <= 0 || !c.finalDate) return 0;
  return Math.round((c.finalWeight || 30) * (100 - (c.currentGrade || 75)) / d);
};

// Parse numeric target from a goal string like "B (83%)" → 83
const parseGoalPct = (goalStr) => {
  if (!goalStr) return 83;
  const m = goalStr.match(/(\d+)/);
  return m ? parseInt(m[1]) : 83;
};

// Grade goal options shared across onboarding + per-course override
const GRADE_GOAL_OPTIONS = [
  { label: 'A (93%)',    pct: 93 },
  { label: 'A- (90%)',  pct: 90 },
  { label: 'B+ (87%)',  pct: 87 },
  { label: 'B (83%)',   pct: 83 },
  { label: 'B- (80%)',  pct: 80 },
  { label: 'C (73%)',   pct: 73 },
];

// Compute grade needed on final to reach target
const calcGradeNeeded = (course, targetPct) => {
  return Math.round((targetPct - (course.currentGrade * (1 - course.finalWeight / 100))) / (course.finalWeight / 100));
};

// Parse max daily study hours from onboarding string e.g. "4-5" → 5, "5+" → 5.5
const parseMaxHours = (str) => {
  if (!str) return 4;
  if (str === '5+') return 5.5;
  const nums = str.match(/\d+/g);
  return nums ? Math.max(...nums.map(Number)) : 4;
};

// ─── ICAL PARSER ─────────────────────────────────────────────────────────────
const parseICSDate = (str) => {
  const bare = str.trim().replace('Z', '');
  if (bare.includes('T')) {
    const d = bare.slice(0, 8), t = bare.slice(9);
    return new Date(`${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}T${t.slice(0,2)}:${t.slice(2,4)}:${t.slice(4,6)}`);
  }
  return new Date(`${bare.slice(0,4)}-${bare.slice(4,6)}-${bare.slice(6,8)}T12:00:00`);
};

const parseICS = (text) => {
  const raw = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  const lines = [];
  for (const line of raw) {
    if ((line.startsWith(' ') || line.startsWith('\t')) && lines.length) lines[lines.length - 1] += line.slice(1);
    else lines.push(line);
  }
  const events = [];
  let cur = null;
  for (const line of lines) {
    if (line === 'BEGIN:VEVENT') { cur = {}; continue; }
    if (line === 'END:VEVENT' && cur) { if (cur.start && cur.title) events.push(cur); cur = null; continue; }
    if (!cur) continue;
    const ci = line.indexOf(':');
    if (ci === -1) continue;
    const key = line.slice(0, ci).split(';')[0].toUpperCase();
    const val = line.slice(ci + 1).trim();
    if (key === 'DTSTART') cur.start = parseICSDate(val);
    else if (key === 'DTEND')   cur.end   = parseICSDate(val);
    else if (key === 'SUMMARY') cur.title = val;
  }
  return events;
};

const findFreeBlocks = (events, fromDate, toDate) => {
  const blocks = [];
  const cur = new Date(fromDate); cur.setHours(0, 0, 0, 0);
  const end = new Date(toDate);   end.setHours(0, 0, 0, 0);
  while (cur <= end) {
    const ds = cur.toISOString().split('T')[0];
    const winStart = new Date(ds + 'T08:00:00');
    const winEnd   = new Date(ds + 'T22:00:00');
    const dayEvts  = events
      .filter(e => e.start && e.end && e.start < winEnd && e.end > winStart)
      .sort((a, b) => a.start - b.start);
    let probe = new Date(winStart);
    for (const e of dayEvts) {
      if (e.start > probe) {
        const hrs = (e.start - probe) / 3600000;
        if (hrs >= 1) blocks.push({ date: ds, startHour: probe.getHours() + probe.getMinutes() / 60, endHour: e.start.getHours() + e.start.getMinutes() / 60, hours: Math.round(hrs * 2) / 2, label: `${Math.round(hrs * 2) / 2}h free` });
      }
      if (e.end > probe) probe = new Date(e.end);
    }
    if (winEnd > probe) {
      const hrs = (winEnd - probe) / 3600000;
      if (hrs >= 1) blocks.push({ date: ds, startHour: probe.getHours() + probe.getMinutes() / 60, endHour: 22, hours: Math.round(hrs * 2) / 2, label: `${Math.round(hrs * 2) / 2}h free` });
    }
    cur.setDate(cur.getDate() + 1);
  }
  return blocks;
};

const fmtHour = (h) => {
  const hh = Math.floor(h), mm = Math.round((h - hh) * 60);
  const ampm = hh >= 12 ? 'pm' : 'am';
  const disp = hh > 12 ? hh - 12 : hh === 0 ? 12 : hh;
  return mm ? `${disp}:${String(mm).padStart(2, '0')}${ampm}` : `${disp}${ampm}`;
};

// ─── SMART STUDY SCHEDULE BUILDER ────────────────────────────────────────────
// Builds a prioritized study plan from courses, study guide mastery, and profile.
// Returns rows: { key, date, startHour, timeLabel, hours, course, topicFocus }
const buildStudySchedule = (courses, sgLecturesByC, profile) => {
  if (!profile || !courses || courses.length === 0) return [];

  const maxPerDay = parseMaxHours(profile?.studyHours || '4-5');
  const profileTarget = parseGoalPct(profile?.gradeGoal);
  const SLOT_LEN = 1.5;
  const BREAK_LEN = 0.25;

  // Per-course urgency + topics analysis
  const courseData = courses
    .filter(c => daysUntil(c.finalDate) > 0)
    .map(c => {
      const days = Math.max(1, daysUntil(c.finalDate));
      const goalPct = c.courseGoal ?? profileTarget;
      const gradeGap = Math.max(0, calcGradeNeeded(c, goalPct));

      // Use study guide mastery if available, else fall back to course.topics
      const sgLecs = (sgLecturesByC || {})[c.id] || [];
      const hasGuide = sgLecs.some(l => l.status === 'ready');
      let topicsLeft = [];
      if (hasGuide) {
        for (const lec of sgLecs) {
          if (!lec.guide?.topics) continue;
          lec.guide.topics.forEach((t, ti) => {
            if (!lec.understood?.[ti]) {
              // t may be a string or {name, summary, concepts} object
              topicsLeft.push({ name: typeof t === 'string' ? t : (t.name || `Topic ${ti + 1}`), lecture: lec.label || '' });
            }
          });
        }
      } else {
        const unStudied = c.topics.filter(t => !t.studied);
        topicsLeft = (unStudied.length > 0 ? unStudied : c.topics).map(t => ({ name: t.name || t }));
      }

      // Urgency: combines exam weight, grade gap pressure, and time crunch
      const urgency = (c.finalWeight / 100) * (1 + gradeGap / 100) * (60 / days);
      return { course: c, urgency, topicsLeft, days };
    })
    .filter(cd => cd.topicsLeft.length > 0);

  if (courseData.length === 0) return [];

  courseData.sort((a, b) => b.urgency - a.urgency);
  const totalUrgency = courseData.reduce((s, cd) => s + cd.urgency, 0) || 1;

  const rows = [];
  const courseTopicIdx = {}; // next topic pointer per course

  const pickCourse = (dateHoursUsed) => {
    // Choose course most under-served relative to urgency share
    let best = courseData[0], bestDiff = -Infinity;
    const totalUsed = Object.values(dateHoursUsed).reduce((s, v) => s + v, 0) + SLOT_LEN;
    for (const cd of courseData) {
      const ideal = (cd.urgency / totalUrgency) * totalUsed;
      const actual = dateHoursUsed[cd.course.id] || 0;
      if (ideal - actual > bestDiff) { bestDiff = ideal - actual; best = cd; }
    }
    return best;
  };

  const getTopicFocus = (cd) => {
    const idx = courseTopicIdx[cd.course.id] || 0;
    const slice = cd.topicsLeft.slice(idx, idx + 2).map(t => t.name);
    courseTopicIdx[cd.course.id] = (idx + 2) % Math.max(1, cd.topicsLeft.length);
    return slice.join(', ') || cd.course.name;
  };

  const toDateStr = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

  if (profile?.freeBlocks?.length > 0) {
    // Schedule into actual free time slots
    const dayUsed = {};
    for (const blk of profile.freeBlocks) {
      if (rows.length >= 50) break;
      let cursor = blk.startHour;
      while (cursor + 1 <= blk.endHour && rows.length < 50) {
        const used = dayUsed[blk.date] || 0;
        if (used >= maxPerDay) break;
        const allowed = Math.min(maxPerDay - used, SLOT_LEN, blk.endHour - cursor);
        if (allowed < 1) break;
        const slotHours = Math.round(allowed * 2) / 2;

        // Filter only courses whose finals haven't passed (no finalDate = always upcoming)
        const dayBlkDate = new Date(blk.date + 'T12:00:00');
        const avail = courseData.filter(cd => !cd.course.finalDate || new Date(cd.course.finalDate + 'T12:00:00') > dayBlkDate);
        if (avail.length === 0) break;

        const dateHoursUsed = {};
        rows.filter(r => r.date === blk.date).forEach(r => {
          dateHoursUsed[r.course.id] = (dateHoursUsed[r.course.id] || 0) + r.hours;
        });
        const cd = avail.reduce((best, cd) => {
          const ideal = (cd.urgency / totalUrgency) * ((dayUsed[blk.date] || 0) + slotHours);
          const actual = dateHoursUsed[cd.course.id] || 0;
          const prev = (best.urgency / totalUrgency) * ((dayUsed[blk.date] || 0) + slotHours) - (dateHoursUsed[best.course.id] || 0);
          return (ideal - actual > prev) ? cd : best;
        }, avail[0]);

        rows.push({
          key: `${blk.date}-${cursor}-${cd.course.id}`,
          date: blk.date,
          startHour: cursor,
          timeLabel: `${fmtHour(cursor)}–${fmtHour(cursor + slotHours)}`,
          hours: slotHours,
          course: cd.course,
          topicFocus: getTopicFocus(cd),
        });

        dayUsed[blk.date] = used + slotHours;
        cursor += slotHours + BREAK_LEN;
      }
    }
  } else {
    // No calendar — generate day-only sessions spread across upcoming days
    const maxDays = Math.max(...courseData.map(cd => cd.days), 30);
    for (let dayOff = 0; rows.length < 40 && dayOff < maxDays; dayOff++) {
      const d = new Date(TODAY); d.setDate(TODAY.getDate() + dayOff);
      const ds = toDateStr(d);
      const avail = courseData.filter(cd => !cd.course.finalDate || new Date(cd.course.finalDate + 'T12:00:00') > d);
      if (avail.length === 0) continue;

      let hoursToday = 0;
      for (let si = 0; hoursToday + 1 <= maxPerDay && si < avail.length && rows.length < 40; si++) {
        const cd = avail[si % avail.length];
        const slotHours = Math.min(SLOT_LEN, maxPerDay - hoursToday);
        if (slotHours < 1) break;
        rows.push({
          key: `${ds}-${si}-${cd.course.id}`,
          date: ds,
          startHour: null,
          timeLabel: null,
          hours: slotHours,
          course: cd.course,
          topicFocus: getTopicFocus(cd),
        });
        hoursToday += slotHours;
      }
    }
  }

  return rows;
};

// ─── API ─────────────────────────────────────────────────────────────────────
async function callAPI(apiKey, system, messages, maxTokens = 4000) {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ apiKey, system, messages, max_tokens: maxTokens })
  });
  const data = await res.json();
  if (!res.ok || data.error) throw new Error(data.error || 'API error');
  // Server returns { content: "string" } — guard against array format too
  return typeof data.content === 'string' ? data.content : data.content[0]?.text;
}
// Alias so existing callClaude call-sites keep working
const callClaude = callAPI;

// ─── CHAT PANEL ──────────────────────────────────────────────────────────────
function ChatPanel({ open, onClose, apiKey, systemPrompt, title, suggestions }) {
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);

  useEffect(() => {
    if (bottomRef.current) bottomRef.current.scrollIntoView({ behavior: 'smooth' });
  }, [msgs, loading]);

  const send = async (text) => {
    const txt = (text || input).trim();
    if (!txt || loading) return;
    setInput('');
    const userMsg = { role: 'user', content: txt };
    const newMsgs = [...msgs, userMsg];
    setMsgs(newMsgs);
    setLoading(true);
    try {
      const reply = await callClaude(apiKey, systemPrompt, newMsgs);
      setMsgs([...newMsgs, { role: 'assistant', content: reply }]);
    } catch (e) {
      setMsgs([...newMsgs, { role: 'assistant', content: `⚠️ ${e.message}` }]);
    }
    setLoading(false);
  };

  if (!open) return null;
  return (
    <div className="chat-panel slide-in">
      <div className="flex items-center justify-between px-5 py-4" style={{ background: '#302C41', borderBottom: '1px solid rgba(255,255,255,0.08)' }}>
        <div>
          <div className="font-bold text-white text-sm" style={{ letterSpacing: '-0.2px' }}>{title}</div>
          <div className="text-xs flex items-center gap-1.5 mt-0.5" style={{ color: 'rgba(255,255,255,0.5)' }}>
            <span className="w-1.5 h-1.5 rounded-full pulse-dot inline-block" style={{ background: '#1E8A4A' }}></span>
            Finals Coach · Active
          </div>
        </div>

function Dashboard({ courses, setCourses, onNavigate, profile, setProfile, sgLecturesByC, onGoToCourseSetup }) {

  const [newCourse, setNewCourse] = useState({ name:'', professor:'', finalDate:'', currentGrade:'', finalWeight:'' });
  const [icsEvents, setIcsEvents] = useState([]);
  const [monthOffset, setMonthOffset] = useState(0);
  const [selectedDate, setSelectedDate] = useState(null);
  const [manualEvents, setManualEvents] = useState([]);
  const [showAddEvent, setShowAddEvent] = useState(false);
  const [newEvent, setNewEvent] = useState({ title:'', date:'', time:'' });
  const icsRef = useRef(null);
  // Study prefs modal
  const [showStudyPrefsModal, setShowStudyPrefsModal] = useState(false);
  const [modalHours, setModalHours] = useState(profile?.studyHours || '4-5');
  const [modalGoal, setModalGoal] = useState(profile?.gradeGoal || 'B (83%)');
  const [modalCalEvents, setModalCalEvents] = useState([]);
  const [modalFreeBlocks, setModalFreeBlocks] = useState([]);
  const [modalCalStatus, setModalCalStatus] = useState(null);
  const [modalCalParsing, setModalCalParsing] = useState(false);
  const modalCalRef = useRef(null);

  const openStudyPrefsModal = () => {
    setModalHours(profile?.studyHours || '4-5');
    setModalGoal(profile?.gradeGoal || 'B (83%)');
    setModalCalEvents(profile?.calendarEvents || []);
    setModalFreeBlocks(profile?.freeBlocks || []);
    setModalCalStatus(profile?.calendarEvents?.length > 0 ? 'success' : null);
    setShowStudyPrefsModal(true);
  };

  const saveStudyPrefs = () => {
    const lastFinal = courses.reduce((max, c) => {
      if (!c.finalDate) return max;
      const d = new Date(c.finalDate + 'T12:00:00');
      return d > max ? d : max;
    }, new Date(TODAY));
    const blocks = modalCalEvents.length > 0 ? findFreeBlocks(modalCalEvents, TODAY, lastFinal) : modalFreeBlocks;
    const newProfile = { ...(profile || {}), studyHours: modalHours, gradeGoal: modalGoal, calendarEvents: modalCalEvents, freeBlocks: blocks };
    if (setProfile) setProfile(newProfile);
    setShowStudyPrefsModal(false);
  };

  const handleModalCalUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setModalCalParsing(true);
    setModalCalStatus(null);
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const events = parseICS(ev.target.result);
        if (events.length === 0) throw new Error('No events found');
        setModalCalEvents(events);
        setModalCalStatus('success');
      } catch (_) { setModalCalStatus('error'); }
      setModalCalParsing(false);
      if (modalCalRef.current) modalCalRef.current.value = '';
    };
    reader.readAsText(file);
  };

  // ICS file parser
  const parseICS = (text) => {
    const events = [];
    const blocks = text.split('BEGIN:VEVENT').slice(1);
    for (const block of blocks) {
      const get = (key) => { const m = block.match(new RegExp(key + '[^:]*:([^\\r\\n]+)')); return m ? m[1].trim() : ''; };
      const raw = get('DTSTART');
      const rawEnd = get('DTEND');
      const summary = get('SUMMARY') || 'Event';
      if (!raw) continue;
      const ds = raw.replace('Z','').replace(/\.\d+$/,'');
      const dateStr = `${ds.slice(0,4)}-${ds.slice(4,6)}-${ds.slice(6,8)}`;
      const timeStr = ds.length >= 13 ? `${ds.slice(9,11)}:${ds.slice(11,13)}` : null;
      const endDs = rawEnd ? rawEnd.replace('Z','') : '';
      const endTimeStr = endDs.length >= 13 ? `${endDs.slice(9,11)}:${endDs.slice(11,13)}` : null;
      events.push({ summary, date: dateStr, time: timeStr, endTime: endTimeStr });
    }
    return events;
  };
  const handleICSImport = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setIcsEvents(parseICS(ev.target.result));
    reader.readAsText(file);
    e.target.value = '';
  };

  // Sort by priority: days remaining + grade impact + coverage
  const ranked = [...courses].sort((a, b) => {
    const dA = daysUntil(a.finalDate), dB = daysUntil(b.finalDate);
    const pA = a.topics.length ? Math.round(a.topics.filter(t=>t.studied).length/a.topics.length*100) : 0;
    const pB = b.topics.length ? Math.round(b.topics.filter(t=>t.studied).length/b.topics.length*100) : 0;
    const sA = (a.finalWeight / Math.max(dA,1)) * (1 + (100-pA)/100);
    const sB = (b.finalWeight / Math.max(dB,1)) * (1 + (100-pB)/100);
    return sB - sA;
  });

  // Study day plan — simple heuristic: allocate more days to higher-priority courses
  const firstFinal = ranked.length > 0 ? daysUntil(ranked.reduce((a, c) => daysUntil(c.finalDate) < daysUntil(a.finalDate) ? c : a, ranked[0]).finalDate) : 0;


  // Grade needed on final — uses per-course override if set, else profile's overall goal

          }
        }
      }
      return 'All topics reviewed. Test yourself!';

    const unStudied = c.topics.filter(t => !t.studied);

              </div>

              <div style={{display:'flex', flexWrap:'wrap', gap:8}}>
                {[['1-2','1–2 hrs'],['2-3','2–3 hrs'],['3-5','3–5 hrs'],['4-5','4–5 hrs'],['5+','5+ hrs']].map(([val, label]) => (
                  <button key={val} onClick={() => setModalHours(val)}
                    style={{padding:'8px 16px', borderRadius:12, border: modalHours===val ? '2px solid #EB7100' : '2px solid #E5E7EB',

            const badgeClass = d <= 7 ? 'badge-urgent' : d <= 14 ? 'badge-soon' : 'badge-ok';
            const hasGuide = courseHasGuide(c);
            const nextTask = getNextTask(c);
            return (
              <div className="card p-4" style={{border: (showScheduledBanner || isTop) ? '1.5px solid #FFBC80' : '1px solid #EDEAF4'}}>
                {showScheduledBanner && (
                  <div style={{fontSize:11, fontWeight:700, color:'#EB7100', marginBottom:8, display:'flex', alignItems:'center', gap:5}}>
                    <span>📅 Scheduled Today</span>
                    {timeLabel && <span style={{fontWeight:500, color:'#9991BF'}}>· {timeLabel}</span>}
                  </div>
                )}
                {!showScheduledBanner && isTop && (
                  <div style={{fontSize:11, fontWeight:700, color:'#B45309', marginBottom:8}}>🔥 Highest Priority</div>
                )}
                <div className="flex items-center gap-3 mb-2 cursor-pointer" onClick={() => onNavigate('finals', c)}>
                  <span style={{fontSize:22}}>{c.emoji}</span>
                  <div style={{flex:1, minWidth:0}}>
                    <p style={{fontWeight:600, fontSize:14, color:'#302C41', margin:'0 0 4px'}}>{c.name}</p>
                    <div style={{display:'flex', alignItems:'center', gap:6, flexWrap:'wrap'}}>
                      <span className={badgeClass}>{d} days</span>
                      <span style={{fontSize:11, color:'#9991BF'}}>{c.finalWeight}% of grade</span>
                    </div>
                  </div>
                  <span style={{fontSize:13, color:'#D5D1E6'}}>→</span>
                </div>
                {showNextTask && nextTask && (
                  <div onClick={() => onNavigate('finals', c)} style={{cursor:'pointer',
                    background: hasGuide ? '#FFF3E8' : '#F7F6FA', borderRadius:8, padding:'7px 10px',
                    display:'flex', alignItems:'flex-start', gap:8, marginTop:4}}>
                    <span style={{fontSize:13}}>{hasGuide ? '📖' : '📝'}</span>
                    <div>
                      <p style={{fontSize:10, fontWeight:700, color:'#9991BF', margin:'0 0 1px', textTransform:'uppercase', letterSpacing:'0.04em'}}>
                        {hasGuide ? 'Next topic in your guide' : 'First topic to cover'}
                      </p>
                      <p style={{fontSize:12, fontWeight:600, color:'#302C41', margin:0}}>{nextTask}</p>
                    </div>
                  </div>
                )}
                {showUploadCTA && (
                  <div style={{marginTop:10, paddingTop:10, borderTop:'1px solid #EDEAF4', display:'flex', alignItems:'center', justifyContent:'space-between', gap:12}}>
                    <span style={{fontSize:12, color:'#302C41', fontWeight:600, lineHeight:1.4}}>
                      Upload study materials to generate your Study Guide
                    </span>
                    <button onClick={() => onNavigate('finals', c)}
                      style={{padding:'6px 14px', borderRadius:100, background:'#EB7100',
                        color:'#FFFFFF', border:'none', fontSize:11, fontWeight:700, cursor:'pointer', whiteSpace:'nowrap', fontFamily:'inherit', flexShrink:0}}>
                      Upload now
                    </button>
                  </div>
                )}
              </div>
            );
          };

          // ── State 1: No guide, no sessions today ──────────────────────────
          if (!anyHasGuide && !hasTodaySessions) {
            return (
              <div>
                <h2 style={{fontSize:11, fontWeight:700, color:'#9991BF', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:4}}>What needs your attention today</h2>
                <p style={{fontSize:13, color:'#9991BF', marginBottom:14}}>Upload study materials to create your personalized study guides.</p>
                <div style={{display:'flex', flexDirection:'column', gap:10}}>
                  {ranked.map((c, i) => (
                    <AttentionCard key={c.id} c={c} isTop={i===0} showUploadCTA={true} />
                  ))}
                </div>
              </div>
            );
          }

          // ── State 2: No guide, has sessions today ─────────────────────────
          if (!anyHasGuide && hasTodaySessions) {
            const uniqToday = [...new Map(todaySessions.map(s => [s.course.id, s])).values()];
            return (
              <div>
                <h2 style={{fontSize:11, fontWeight:700, color:'#9991BF', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:4}}>What needs your attention today</h2>
                <p style={{fontSize:13, color:'#9991BF', marginBottom:14}}>You have study sessions planned. Upload materials to make the most of them.</p>
                <div style={{display:'flex', flexDirection:'column', gap:10}}>
                  {uniqToday.map(s => (
                    <AttentionCard key={s.course.id} c={s.course} showScheduledBanner={true} timeLabel={s.timeLabel} showUploadCTA={true} />
                  ))}
                </div>
              </div>
            );
          }

          // ── State 3: Has guide, no sessions today ─────────────────────────
          if (anyHasGuide && !hasTodaySessions) {
            return (
              <div>
                <h2 style={{fontSize:11, fontWeight:700, color:'#9991BF', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:4}}>What needs your attention today</h2>
                <p style={{fontSize:13, color:'#9991BF', marginBottom:14}}>No sessions scheduled. Pick up where you left off.</p>
                <div style={{display:'flex', flexDirection:'column', gap:10}}>
                  {ranked.slice(0, 3).map((c, i) => (
                    <AttentionCard key={c.id} c={c} isTop={i===0} showNextTask={true} />
                  ))}
                </div>
              </div>
            );
          }

          // ── State 4: Has guide, has sessions today ────────────────────────
          const uniqToday4 = [...new Map(todaySessions.map(s => [s.course.id, s])).values()];
          return (
            <div>
              <h2 style={{fontSize:11, fontWeight:700, color:'#9991BF', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:4}}>What needs your attention today</h2>
              <p style={{fontSize:13, color:'#9991BF', marginBottom:14}}>Here's your study plan for today.</p>
              <div style={{display:'flex', flexDirection:'column', gap:10}}>
                {uniqToday4.map(s => (
                  <AttentionCard key={s.course.id} c={s.course} showScheduledBanner={true} timeLabel={s.timeLabel} showNextTask={true} />
                ))}
              </div>
            </div>
          );
        })()}
      </div>

      {/* RIGHT — Monthly Calendar Widget */}
      {(() => {
        const hasCal = profile?.freeBlocks?.length > 0;
        const calPlan = studyPlan; // already computed above; same data powers both panels

        // ICS export
        const toICSdt = (ds, h) => { const hh=Math.floor(h), mm=Math.round((h-hh)*60); return `${ds.replace(/-/g,'')}T${String(hh).padStart(2,'0')}${String(mm).padStart(2,'0')}00`; };
        const exportPlanToICS = (rows) => {
          const uid = () => Math.random().toString(36).slice(2);
          const lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Finals Coach//Study Plan//EN','CALSCALE:GREGORIAN'];
          for (const row of rows) {
            const sh = row.startHour ?? 9; // default 9am for date-only sessions
            lines.push('BEGIN:VEVENT',`UID:${uid()}@campusagent`,`DTSTART:${toICSdt(row.date,sh)}`,
              `DTEND:${toICSdt(row.date,sh+row.hours)}`,
              `SUMMARY:📚 ${row.course.name}: Finals Prep`,
              row.topicFocus ? `DESCRIPTION:Topics: ${row.topicFocus}` : '',
              'END:VEVENT');
          }
          lines.push('END:VCALENDAR');
          const blob = new Blob([lines.join('\r\n')],{type:'text/calendar;charset=utf-8'});
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a'); a.href=url; a.download='study-plan.ics'; a.click();
          URL.revokeObjectURL(url);
        };

        // Monthly calendar helpers
        const toDateStr = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        const todayStr = toDateStr(TODAY);
        const monthStart = new Date(TODAY.getFullYear(), TODAY.getMonth() + monthOffset, 1);
        const daysInMonth = new Date(TODAY.getFullYear(), TODAY.getMonth() + monthOffset + 1, 0).getDate();
        const firstDow = monthStart.getDay(); // 0 = Sunday
        const monthLabel = monthStart.toLocaleDateString('en-US', {month:'long', year:'numeric'});

        // Build grid cells (null = empty padding cell)
        const cells = [];
        for (let i = 0; i < firstDow; i++) cells.push(null);
        for (let d = 1; d <= daysInMonth; d++) cells.push(d);
        while (cells.length % 7 !== 0) cells.push(null);

        // Group all events by date
        const studyByDate = {};
        calPlan.forEach(r => { if (!studyByDate[r.date]) studyByDate[r.date]=[]; studyByDate[r.date].push(r); });
        const icsByDate = {};
        icsEvents.forEach(ev => { if (!icsByDate[ev.date]) icsByDate[ev.date]=[]; icsByDate[ev.date].push(ev); });
        const manualByDate = {};
        manualEvents.forEach(ev => { if (!manualByDate[ev.date]) manualByDate[ev.date]=[]; manualByDate[ev.date].push(ev); });
        const finalDates = {};
        courses.forEach(c => { if (c.finalDate) finalDates[c.finalDate] = c; });

        // Helper: get all events for a date string
        const getEventsForDate = (ds) => {
          const evs = [];
          (studyByDate[ds]||[]).forEach(r => {
            const sub = [r.timeLabel, r.topicFocus].filter(Boolean).join(' · ');
            evs.push({type:'study', label:`📚 ${r.course.name}`, sub});
          });
          (icsByDate[ds]||[]).forEach(ev => evs.push({type:'ics', label:ev.summary||'Event', sub:ev.time||''}));
          (manualByDate[ds]||[]).forEach(ev => evs.push({type:'manual', label:ev.title, sub:ev.time||''}));
          if (finalDates[ds]) evs.push({type:'exam', label:`🎓 Final: ${finalDates[ds].name}`, sub:''});
          return evs;
        };

        // Upcoming events for next 60 days (when no date selected)
        const upcomingGroups = [];
        for (let i = 0; i < 60; i++) {
          const d = new Date(TODAY); d.setDate(TODAY.getDate() + i);
          const ds = toDateStr(d);
          const evs = getEventsForDate(ds);
          if (evs.length > 0) upcomingGroups.push({
            ds, evs,
            label: d.toLocaleDateString('en-US',{weekday:'short', month:'short', day:'numeric'})
          });
        }

        const selEvs = selectedDate ? getEventsForDate(selectedDate) : null;
        const selLabel = selectedDate
          ? new Date(selectedDate + 'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})
          : null;

        const DOT_COLORS = {study:'#EB7100', ics:'#6366F1', manual:'#6366F1', exam:'#EF4444'};
        const hasStudyPrefs = !!profile?.studyHours;

        return (
          <div className="card p-5">
            {/* Header */}
            <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14}}>
              <h3 style={{fontWeight:700, fontSize:14, color:'#302C41', margin:0}}>📅 Study Calendar</h3>
              <div style={{display:'flex', alignItems:'center', gap:6}}>
                {hasStudyPrefs && (
                  <label style={{fontSize:11, fontWeight:600, color:'#9991BF', cursor:'pointer',
                    border:'1px solid #EDEAF4', borderRadius:8, padding:'4px 10px', whiteSpace:'nowrap'}}>
                    ↑ Import .ics
                    <input type="file" accept=".ics" style={{display:'none'}} onChange={handleICSImport} />
                  </label>
                )}
                {hasCal && hasStudyPrefs && (
                  <button onClick={() => exportPlanToICS(calPlan)}
                    style={{fontSize:11, fontWeight:600, background:'#EB7100', color:'white',
                      border:'none', borderRadius:8, padding:'4px 10px', cursor:'pointer', whiteSpace:'nowrap'}}>
                    ↓ Export .ics
                  </button>
                )}
              </div>
            </div>

            {/* Create study schedule CTA (no prefs set yet) */}
            {!hasStudyPrefs && (
              <div style={{borderRadius:12, background:'linear-gradient(135deg,#F7F6FA,#EDEAF4)', border:'1.5px dashed #D5D1E6', padding:'22px 18px', textAlign:'center', marginBottom:14}}>
                <div style={{fontSize:22, marginBottom:6}}>🗓️</div>
                <div style={{fontSize:13, fontWeight:700, color:'#302C41', marginBottom:4}}>Create your study schedule</div>
                <div style={{fontSize:12, color:'#9991BF', lineHeight:1.5, marginBottom:12}}>Add your study preferences to generate a personalized day-by-day plan.</div>
                <button onClick={openStudyPrefsModal}
                  style={{background:'#EB7100', color:'white', border:'none', borderRadius:100, padding:'8px 20px', fontSize:12, fontWeight:700, cursor:'pointer', fontFamily:'inherit'}}>
                  Add details
                </button>
              </div>
            )}

            {/* ── Upcoming study sessions strip (next 3 days with sessions) ── */}
            {hasStudyPrefs && (() => {
              const toDateStrC = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
              const nextStrip = [];
              for (let i = 0; i < 7 && nextStrip.length < 3; i++) {
                const d = new Date(TODAY); d.setDate(TODAY.getDate() + i);
                const ds = toDateStrC(d);
                const sessions = (studyByDate[ds] || []);
                const exam = finalDates[ds];
                if (sessions.length > 0 || exam) nextStrip.push({ ds, sessions, exam, d });
              }
              if (nextStrip.length === 0) return null;
              return (
                <div style={{marginBottom:12, display:'flex', flexDirection:'column', gap:5}}>
                  {nextStrip.map(({ ds, sessions, exam, d }) => {
                    const isToday = ds === todayStr;
                    const dayLabel = isToday ? 'Today' : d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
                    return (
                      <div key={ds} onClick={() => setSelectedDate(selectedDate === ds ? null : ds)}
                        style={{
                          borderRadius:9, padding:'7px 10px', cursor:'pointer',
                          background: isToday ? '#FFF3E8' : '#F7F6FA',
                          border: isToday ? '1.5px solid #FFBC80' : '1px solid #EDEAF4',
                          display:'flex', alignItems:'center', gap:8
                        }}>
                        <div style={{flexShrink:0, width:36, textAlign:'center'}}>
                          <p style={{fontSize:10, fontWeight:700, color: isToday ? '#EB7100' : '#9991BF', margin:0, lineHeight:1.2}}>{dayLabel.split(' ')[0]}</p>
                          <p style={{fontSize:13, fontWeight:800, color: isToday ? '#EB7100' : '#302C41', margin:0, lineHeight:1}}>{d.getDate()}</p>
                        </div>
                        <div style={{flex:1, minWidth:0}}>
                          {sessions.slice(0,2).map((r,ri) => (
                            <p key={ri} style={{fontSize:11, fontWeight:600, color:'#302C41', margin:0,
                              overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                              📚 {r.topicFocus ? r.topicFocus : r.course.name}
                              {r.timeLabel ? <span style={{color:'#9991BF', fontWeight:400}}> · {r.timeLabel}</span> : ''}
                            </p>
                          ))}
                          {sessions.length > 2 && <p style={{fontSize:10, color:'#9991BF', margin:0}}>+{sessions.length-2} more</p>}
                          {exam && <p style={{fontSize:11, fontWeight:700, color:'#EF4444', margin: sessions.length > 0 ? '2px 0 0' : 0}}>🎓 Final: {exam.name}</p>}
                        </div>
                        <div style={{flexShrink:0, textAlign:'right'}}>
                          {sessions.length > 0 && (
                            <span style={{fontSize:10, fontWeight:600, color:'#EB7100',
                              background:'#FFF3E8', border:'1px solid #FFBC80',
                              borderRadius:6, padding:'2px 7px'}}>
                              {sessions.reduce((s,r)=>s+r.hours,0)}h
                            </span>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })()}

            {/* Month navigation */}

            <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10}}>
              <button onClick={() => setMonthOffset(m=>m-1)}
                style={{background:'none', border:'none', cursor:'pointer', fontSize:16, color:'#9991BF', padding:'2px 6px', lineHeight:1}}>‹</button>
              <span style={{fontSize:13, fontWeight:700, color:'#302C41'}}>{monthLabel}</span>
              <button onClick={() => setMonthOffset(m=>m+1)}
                style={{background:'none', border:'none', cursor:'pointer', fontSize:16, color:'#9991BF', padding:'2px 6px', lineHeight:1}}>›</button>
            </div>

            {/* Day-of-week headers */}
            <div style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', marginBottom:4}}>
              {['S','M','T','W','T','F','S'].map((d,i) => (
                <div key={i} style={{textAlign:'center', fontSize:10, fontWeight:700,
                  color:'#9991BF', letterSpacing:'0.04em', paddingBottom:6}}>{d}</div>
              ))}
            </div>

            {/* Month grid */}
            <div style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:2}}>
              {cells.map((day, idx) => {
                if (!day) return <div key={idx} style={{minHeight:34}} />;
                const ds = toDateStr(new Date(monthStart.getFullYear(), monthStart.getMonth(), day));
                const isToday = ds === todayStr;
                const isPast = ds < todayStr;
                const isSel = ds === selectedDate;
                const evs = getEventsForDate(ds);
                const hasStudy = evs.some(e=>e.type==='study');
                const hasICS = evs.some(e=>e.type==='ics'||e.type==='manual');
                const hasExam = evs.some(e=>e.type==='exam');
                return (
                  <div key={idx} onClick={() => setSelectedDate(isSel ? null : ds)}
                    style={{
                      borderRadius:8, minHeight:34, padding:'4px 2px', textAlign:'center',
                      cursor: 'pointer',
                      background: isSel ? '#302C41' : hasExam && !isToday ? '#FEF2F2' : isToday ? '#FFF3E8' : 'transparent',
                      border: isSel ? '1.5px solid transparent' : hasExam ? '1.5px solid #FECACA' : isToday ? '1.5px solid #EB7100' : '1.5px solid transparent',
                    }}>
                    <p style={{
                      fontSize:12, fontWeight: isToday || isSel ? 700 : 400, margin:0, lineHeight:'1.3',
                      color: isSel ? 'white' : isToday ? '#EB7100' : isPast ? '#C8C8C8' : '#302C41',
                    }}>{day}</p>
                    {/* Event dots */}
                    {evs.length > 0 && (
                      <div style={{display:'flex', justifyContent:'center', gap:2, marginTop:2}}>
                        {hasStudy && <div style={{width:4,height:4,borderRadius:'50%',background: isSel?'rgba(255,255,255,0.7)':'#EB7100'}} />}
                        {hasICS && <div style={{width:4,height:4,borderRadius:'50%',background: isSel?'rgba(255,255,255,0.7)':'#6366F1'}} />}
                        {hasExam && <div style={{width:4,height:4,borderRadius:'50%',background: isSel?'rgba(255,255,255,0.7)':'#EF4444'}} />}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Legend */}
            <div style={{display:'flex', alignItems:'center', gap:12, marginTop:12, paddingTop:10, borderTop:'1px solid #EDEAF4', flexWrap:'wrap'}}>
              <div style={{display:'flex', alignItems:'center', gap:5}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:'#EB7100'}} />
                <span style={{fontSize:10, color:'#9991BF'}}>Study sessions</span>
              </div>
              <div style={{display:'flex', alignItems:'center', gap:5}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:'#6366F1'}} />
                <span style={{fontSize:10, color:'#9991BF'}}>Imported events</span>
              </div>
              <div style={{display:'flex', alignItems:'center', gap:5}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:'#EF4444'}} />
                <span style={{fontSize:10, color:'#9991BF'}}>Final exams</span>
              </div>
            </div>

            {/* Events list */}
            <div style={{marginTop:14, borderTop:'1px solid #EDEAF4', paddingTop:12}}>
              {selectedDate ? (
                <div>
                  <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8}}>
                    <p style={{fontSize:12, fontWeight:700, color:'#302C41', margin:0}}>{selLabel}</p>
                    <button onClick={() => setSelectedDate(null)}
                      style={{fontSize:11, color:'#9991BF', background:'none', border:'none', cursor:'pointer', padding:0}}>✕</button>
                  </div>
                  {selEvs.length === 0 ? (
                    <p style={{fontSize:12, color:'#BDBDBD', textAlign:'center', padding:'10px 0', margin:0}}>No events this day</p>
                  ) : selEvs.map((ev,i) => (
                    <div key={i} style={{display:'flex', alignItems:'flex-start', gap:8, padding:'6px 0',
                      borderBottom: i < selEvs.length-1 ? '1px solid #F5F4F9' : 'none'}}>
                      <div style={{width:8,height:8,borderRadius:'50%',flexShrink:0,marginTop:3,background:DOT_COLORS[ev.type]||'#9991BF'}} />
                      <div style={{flex:1, minWidth:0}}>
                        <p style={{fontSize:12, fontWeight:600, color:'#302C41', margin:0,
                          overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{ev.label}</p>
                        {ev.sub && <p style={{fontSize:10, color:'#9991BF', margin:0}}>{ev.sub}</p>}
                      </div>
                    </div>
                  ))}
                </div>
              ) : (
                <div>
                  <p style={{fontSize:10, fontWeight:700, color:'#9991BF', textTransform:'uppercase',
                    letterSpacing:'0.06em', margin:'0 0 8px'}}>Upcoming</p>
                  {upcomingGroups.length === 0 ? (
                    <p style={{fontSize:12, color:'#BDBDBD', textAlign:'center', padding:'10px 0', margin:0}}>No upcoming events</p>
                  ) : upcomingGroups.slice(0,6).map((grp,gi) => (
                    <div key={gi} style={{marginBottom:10, cursor:'pointer'}} onClick={() => setSelectedDate(grp.ds)}>
                      <p style={{fontSize:11, fontWeight:700, color:'#302C41', margin:'0 0 3px'}}>{grp.label}</p>
                      {grp.evs.map((ev,j) => (
                        <div key={j} style={{display:'flex', alignItems:'center', gap:6, padding:'1px 0'}}>
                          <div style={{width:6,height:6,borderRadius:'50%',flexShrink:0,background:DOT_COLORS[ev.type]||'#9991BF'}} />
                          <p style={{fontSize:11, color:'#555', margin:0,
                            overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                            {ev.label}{ev.sub ? ` · ${ev.sub}` : ''}
                          </p>
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Add event inline form */}
            {showAddEvent ? (
              <div style={{marginTop:12, padding:'12px', borderRadius:10, background:'#F7F6FA', border:'1px solid #EDEAF4'}}>
                <p style={{fontSize:12, fontWeight:700, color:'#302C41', margin:'0 0 8px'}}>Add Event</p>
                <input value={newEvent.title} onChange={e=>setNewEvent(p=>({...p,title:e.target.value}))}
                  placeholder="Event title"
                  style={{width:'100%', padding:'6px 10px', borderRadius:8, border:'1px solid #EDEAF4',
                    fontSize:12, marginBottom:6, boxSizing:'border-box', background:'white', outline:'none'}} />
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:6, marginBottom:8}}>
                  <input type="date" value={newEvent.date} onChange={e=>setNewEvent(p=>({...p,date:e.target.value}))}
                    style={{padding:'6px 8px', borderRadius:8, border:'1px solid #EDEAF4', fontSize:12, background:'white', outline:'none'}} />
                  <input type="time" value={newEvent.time} onChange={e=>setNewEvent(p=>({...p,time:e.target.value}))}
                    style={{padding:'6px 8px', borderRadius:8, border:'1px solid #EDEAF4', fontSize:12, background:'white', outline:'none'}} />
                </div>
                <div style={{display:'flex', gap:6}}>
                  <button onClick={() => { setShowAddEvent(false); setNewEvent({title:'',date:'',time:''}); }}
                    style={{flex:1, padding:'6px', borderRadius:8, border:'1px solid #EDEAF4', background:'white',
                      fontSize:12, cursor:'pointer', color:'#9991BF'}}>Cancel</button>
                  <button disabled={!newEvent.title.trim() || !newEvent.date}
                    onClick={() => {
                      setManualEvents(prev => [...prev, {...newEvent, id:Date.now()}]);
                      setSelectedDate(newEvent.date);
                      setShowAddEvent(false);
                      setNewEvent({title:'',date:'',time:''});
                    }}
                    style={{flex:1, padding:'6px', borderRadius:8, background:'#EB7100', color:'white',
                      border:'none', fontSize:12, fontWeight:600, cursor:'pointer', opacity: (!newEvent.title.trim()||!newEvent.date)?0.4:1}}>
                    Add Event
                  </button>
                </div>
              </div>
            ) : (
              <button onClick={() => setShowAddEvent(true)}
                style={{marginTop:12, width:'100%', padding:'7px', borderRadius:8,
                  border:'1.5px dashed #EDEAF4', background:'transparent', fontSize:12,
                  color:'#9991BF', cursor:'pointer', fontWeight:500}}>
                + Add Event Manually
              </button>
            )}
          </div>
        );
      })()}

      </div>{/* end 2-col grid */}
      </>)}
    </div>
  );
}

// ─── FINALS PREP ──────────────────────────────────────────────────────────────
function FinalsPrep({ courses, setCourses, apiKey, focusCourse, profile, onNavigate, sgLecturesByC, setSgLecturesByC, seedRawFiles, onSeedConsumed }) {
  const [selected, setSelected] = useState(focusCourse || null);
  const [chatOpen, setChatOpen] = useState(false);
  // Course edit/delete
  const [editingCourse, setEditingCourse] = useState(null); // course object being edited
  // Syllabus upload for course detail
  const [syllabusUploading, setSyllabusUploading] = useState(false);
  const [syllabusStatus, setSyllabusStatus] = useState(null); // null|'success'|'error'
  const syllabusRef = useRef(null);

  useEffect(() => { if (focusCourse) setSelected(focusCourse); }, [focusCourse]);

  const handleSyllabusUpload = async (e) => {
    const file = e.target.files[0];
    if (!file || !selected) return;
    setSyllabusUploading(true); setSyllabusStatus(null);
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const isText = file.type === 'text/plain', isImage = file.type.startsWith('image/');
        const base64 = isText ? null : ev.target.result.split(',')[1];
        let content;
        if (isText) content = ev.target.result;
        else if (isImage) content = [{ type:'image', source:{ type:'base64', media_type:file.type, data:base64 } }, { type:'text', text:'Extract course schedule information from this syllabus image.' }];
        else content = [{ type:'document', source:{ type:'base64', media_type:'application/pdf', data:base64 } }, { type:'text', text:'Extract course schedule information from this syllabus PDF.' }];
        const sys = `Extract structured information from a university course syllabus. Return ONLY valid JSON:
{"courseName":"","professor":"","finalDate":"YYYY-MM-DD or empty","finalWeight":25,"officeHours":"","gradingBreakdown":[{"component":"","weight":""}],"topics":["topic 1","topic 2"]}
Rules: finalDate is end-of-semester final only; topics are 5-15 main modules; default year 2026 if ambiguous.`;
        const msgs = [{ role:'user', content: isText ? `${content}\n\nExtract course info and return JSON.` : [...(Array.isArray(content)?content.slice(0,-1):content), { type:'text', text:'Extract course info and return JSON.' }] }];
        const reply = await callClaude(apiKey, sys, msgs);
        const data = JSON.parse(reply.replace(/```json\n?|\n?```/g,'').replace(/```\n?/g,'').trim());
        const courseId = selected.id;
        setCourses(prev => prev.map(c => {
          if (c.id !== courseId) return c;
          return {
            ...c,
            professor: data.professor?.trim() || c.professor,
            finalDate: data.finalDate || c.finalDate || '',
            finalWeight: data.finalWeight != null ? data.finalWeight : c.finalWeight,
            officeHours: data.officeHours || c.officeHours || '',
            gradingBreakdown: data.gradingBreakdown?.length ? data.gradingBreakdown : (c.gradingBreakdown || []),
            topics: data.topics?.length ? data.topics.map((t,j) => ({ id:j+1, name:t, studied:false, mastery:0 })) : c.topics,
          };
        }));
        setSyllabusStatus('success');
      } catch(_) { setSyllabusStatus('error'); }
      setSyllabusUploading(false);
      if (syllabusRef.current) syllabusRef.current.value = '';
    };
    if (file.type === 'text/plain') reader.readAsText(file);
    else reader.readAsDataURL(file);
  };

  if (!selected) {
    const ranked = [...courses].sort((a,b) => priorityScore(b) - priorityScore(a));

    // ── Study plan state detection for FinalsPrep list ─────────────────────
    const fpTodayStr = `${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,'0')}-${String(TODAY.getDate()).padStart(2,'0')}`;
    const fpStudyPlan = buildStudySchedule(courses, sgLecturesByC, profile);
    const fpTodaySessions = fpStudyPlan.filter(r => r.date === fpTodayStr);
    const fpCourseHasGuide = (c) => (sgLecturesByC[c.id] || []).some(l => l.status === 'ready');
    const fpAnyHasGuide = courses.some(c => fpCourseHasGuide(c));
    const fpHasTodaySessions = fpTodaySessions.length > 0;
    const fpCourseSessions = (c) => fpTodaySessions.filter(s => s.course.id === c.id);
    const fpGetNextTask = (c) => {
      const sgLecs = (sgLecturesByC[c.id] || []).filter(l => l.status === 'ready');
      if (sgLecs.length > 0) {
        for (const lec of sgLecs) {
          const topics = lec.guide?.topics || [];
          for (let ti = 0; ti < topics.length; ti++) {
            if (!lec.understood?.[ti]) {
              const t = topics[ti];
              return typeof t === 'string' ? t : (t.name || `Topic ${ti + 1}`);
            }
          }
        }
        return 'All topics reviewed. Test yourself!';
      }
      const unStudied = c.topics.filter(t => !t.studied);
      return unStudied.length > 0 ? unStudied[0].name : null;
    };

    // Subtitle changes per state
    const fpSubtitle = (!fpAnyHasGuide && !fpHasTodaySessions)
      ? 'Upload study materials to create your personalized study guides, sorted by priority'
      : (!fpAnyHasGuide && fpHasTodaySessions)
      ? 'Upload study materials to prep for today\'s scheduled sessions'
      : (fpAnyHasGuide && !fpHasTodaySessions)
      ? 'Keep the momentum going. Pick up where you left off'
      : 'Your study plan for today and progress across all finals';

    return (
      <div className="fade-in space-y-4">
        {/* Edit Course Modal */}
        {editingCourse && (
          <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.4)', zIndex:200, display:'flex', alignItems:'center', justifyContent:'center', padding:24}}>
            <div className="card p-6 fade-in" style={{maxWidth:460, width:'100%', maxHeight:'80vh', overflowY:'auto'}}>
              <div className="flex items-center justify-between mb-4">
                <h3 className="font-bold text-gray-900">Edit Course</h3>
                <button onClick={() => setEditingCourse(null)} className="text-gray-400 hover:text-gray-600 text-lg">✕</button>
              </div>
              <div className="space-y-3">
                <div>
                  <label className="text-xs font-bold text-gray-600 block mb-1">Course Name</label>
                  <input value={editingCourse.name} onChange={e => setEditingCourse(p=>({...p,name:e.target.value}))}
                    className="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:border-orange-400 bg-gray-50"/>
                </div>
                <div>
                  <label className="text-xs font-bold text-gray-600 block mb-1">Professor</label>
                  <input value={editingCourse.professor||''} onChange={e => setEditingCourse(p=>({...p,professor:e.target.value}))}
                    className="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:border-orange-400 bg-gray-50"/>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="text-xs font-bold text-gray-600 block mb-1">Final Exam Date</label>
                    <input type="date" value={editingCourse.finalDate||''} onChange={e => setEditingCourse(p=>({...p,finalDate:e.target.value}))}
                      className="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:border-orange-400 bg-gray-50"/>
                  </div>
                  <div>
                    <label className="text-xs font-bold text-gray-600 block mb-1">Current Grade %</label>
                    <input type="number" min="0" max="100" value={editingCourse.currentGrade||''} onChange={e => setEditingCourse(p=>({...p,currentGrade:parseInt(e.target.value)||0}))}
                      className="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:border-orange-400 bg-gray-50"/>
                  </div>
                </div>
                <div>
                  <label className="text-xs font-bold text-gray-600 block mb-1">Final Exam Weight %</label>
                  <input type="number" min="0" max="100" value={editingCourse.finalWeight||''} onChange={e => setEditingCourse(p=>({...p,finalWeight:parseInt(e.target.value)||0}))}
                    className="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:border-orange-400 bg-gray-50"/>
                </div>
              </div>
              <div className="flex gap-3 mt-5">
                <button onClick={() => setEditingCourse(null)} className="btn-secondary flex-1 text-sm">Cancel</button>
                <button onClick={() => {
                  setCourses(prev => prev.map(c => c.id === editingCourse.id ? { ...c, ...editingCourse } : c));
                  setEditingCourse(null);
                }} className="btn-primary flex-1 text-sm">Save Changes</button>
              </div>
            </div>
          </div>
        )}

        <div className="flex items-center justify-between">
          <div>
            <h1 className="text-2xl font-bold text-gray-900">Finals Prep</h1>
            <p className="text-gray-500 text-sm">{fpSubtitle}</p>
          </div>
          <button onClick={() => {
            const newCourse = {
              id: `user_${Date.now()}`, name: 'New Course', code: '', professor: '',
              finalDate: null, currentGrade: 80, finalWeight: 30,
              emoji: '📚', color: 'from-indigo-500 to-indigo-600',
              officeHours: '', gradingBreakdown: [], quizDates: [], assignments: [], topics: []
            };
            setCourses(prev => [...prev, newCourse]);
            setEditingCourse(newCourse);
          }} className="btn-secondary text-sm flex items-center gap-1.5">
            + Add Course
          </button>
        </div>
        {ranked.map((c, rank) => {
          const d = daysUntil(c.finalDate);
          const studied = c.topics.filter(t=>t.studied).length;
          const pct = c.topics.length ? Math.round(studied / c.topics.length * 100) : 0;
          const topicsLeft = c.topics.length - studied;
          const badgeClass = d<=7 ? 'badge-urgent' : d<=14 ? 'badge-soon' : 'badge-ok';
          const profileTgt = parseGoalPct(profile?.gradeGoal);
          const courseTgt = c.courseGoal ?? profileTgt;
          const need = calcGradeNeeded(c, courseTgt);
          const goalLbl = (GRADE_GOAL_OPTIONS.find(o => o.pct === courseTgt)?.label.split(' ')[0]) || (courseTgt + '%');
          const hasOverride = c.courseGoal != null && c.courseGoal !== profileTgt;
          // State-aware helpers for this card
          const sessionsToday = fpCourseSessions(c);
          const isScheduledToday = sessionsToday.length > 0;
          const hasGuide = fpCourseHasGuide(c);
          const nextTask = fpGetNextTask(c);
          const isTopPriority = rank === 0;
          return (
            <div key={c.id}
              className="card p-5 transition-all"
              style={{border: isScheduledToday ? '1.5px solid #FFBC80' : isTopPriority && !fpHasTodaySessions ? '1.5px solid #FED7AA' : '1px solid #EDEAF4'}}>
              {/* Banner row: Scheduled Today > Highest Priority (when no sessions) */}
              {isScheduledToday ? (
                <div style={{display:'flex', alignItems:'center', gap:6, marginBottom:8}}>
                  <span style={{fontSize:11, fontWeight:700, color:'#EB7100'}}>📅 Scheduled Today</span>
                  {sessionsToday[0]?.timeLabel && <span style={{fontSize:11, color:'#9991BF', fontWeight:500}}>· {sessionsToday[0].timeLabel}</span>}
                </div>
              ) : isTopPriority && (
                <div className="text-xs font-bold text-amber-700 mb-2">🔥 Highest Priority: Study This First</div>
              )}
              <div className="flex items-start justify-between mb-3">
                <div className="flex items-center gap-3 cursor-pointer flex-1" onClick={() => setSelected(c)}>
                  <span className="text-3xl">{c.emoji}</span>
                  <div>
                    <div className="font-bold text-gray-900">{c.name}</div>
                    <div className="text-sm text-gray-500">{c.code} · {c.professor}</div>
                  </div>
                </div>
                <div className="flex items-center gap-2 flex-shrink-0">
                  <div className="text-right mr-2">
                    <span className={badgeClass}>{d} days</span>
                    <div className="text-xs text-gray-500 mt-1">Final: {c.finalDate ? new Date(c.finalDate+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : 'TBD'}</div>
                  </div>
                  <button onClick={e => { e.stopPropagation(); setEditingCourse({...c}); }}
                    className="w-7 h-7 rounded-lg flex items-center justify-center text-gray-400 hover:text-orange-600 hover:bg-orange-50 transition-all text-sm" title="Edit course">✏️</button>
                  <button onClick={e => { e.stopPropagation(); if (window.confirm(`Remove ${c.name}?`)) { setCourses(prev => prev.filter(x => x.id !== c.id)); if (selected?.id === c.id) setSelected(null); } }}
                    className="w-7 h-7 rounded-lg flex items-center justify-center text-gray-400 hover:text-red-600 hover:bg-red-50 transition-all text-sm" title="Delete course">🗑️</button>
                </div>
              </div>
              <div className="flex items-center gap-3 mb-2 cursor-pointer" onClick={() => setSelected(c)}>
                <div className="progress-bar h-2 flex-1">
                  <div className="progress-fill" style={{ width: `${pct}%`, background: pct>60?'#10b981':pct>30?'#f59e0b':'#ef4444' }}></div>
                </div>
                <span className="text-xs font-bold text-gray-600">{studied}/{c.topics.length} topics</span>
              </div>
              <div className="flex gap-3 flex-wrap cursor-pointer" onClick={() => setSelected(c)}>
                <span className="text-xs bg-orange-100 text-orange-700 px-2 py-0.5 rounded-full font-semibold">Final = {c.finalWeight}% of grade</span>
                <span className="text-xs px-2 py-0.5 rounded-full font-semibold" style={{ background: c.currentGrade<80?'#fee2e2':'#d1fae5', color: c.currentGrade<80?'#991b1b':'#065f46' }}>
                  Current: {c.currentGrade}%
                </span>
                {need > 0 && need <= 100 && (
                  <span className="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">
                    Need {need}% for {goalLbl}{hasOverride && ' ✏️'}
                  </span>
                )}
                {need > 100 && <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">✓ {goalLbl} secured!</span>}
                {topicsLeft > 0 && <span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">{topicsLeft} topics uncovered</span>}
              </div>
              {/* Next task or Upload CTA — the key state-aware row */}
              {hasGuide && nextTask ? (
                <div onClick={() => setSelected(c)} style={{cursor:'pointer', marginTop:10,
                  background: isScheduledToday ? '#FFF3E8' : '#F7F6FA',
                  borderRadius:8, padding:'8px 12px', display:'flex', alignItems:'flex-start', gap:8}}>
                  <span style={{fontSize:14}}>📖</span>
                  <div>
                    <p style={{fontSize:10, fontWeight:700, color:'#9991BF', margin:'0 0 1px', textTransform:'uppercase', letterSpacing:'0.04em'}}>
                      {isScheduledToday ? "Today's focus" : 'Next topic to study'}
                    </p>
                    <p style={{fontSize:13, fontWeight:600, color:'#302C41', margin:0}}>{nextTask}</p>
                  </div>
                </div>
              ) : !hasGuide ? (
                <div style={{marginTop:10, display:'flex'}}>
                  <button onClick={() => setSelected(c)}
                    style={{padding:'5px 12px', borderRadius:6, background:'#FFF3E8',
                      color:'#EB7100', border:'1px solid #FFBC80', fontSize:11, fontWeight:700, cursor:'pointer', whiteSpace:'nowrap'}}>
                    📂 Upload Study Materials →
                  </button>
                </div>
              ) : null}
            </div>
          );
        })}
      </div>
    );
  }

  const course = courses.find(c => c.id === selected.id);
  if (!course) { setSelected(null); return null; }
  const d = daysUntil(course.finalDate);
  const profileTarget = parseGoalPct(profile?.gradeGoal);
  const activeTarget = course.courseGoal ?? profileTarget;
  const activeGoalLabel = GRADE_GOAL_OPTIONS.find(o => o.pct === activeTarget)?.label || (activeTarget + '%');
  const gradeNeededForGoal = calcGradeNeeded(course, activeTarget);
  const setCourseGoal = (pct) => setCourses(prev => prev.map(c => c.id === course.id ? { ...c, courseGoal: pct } : c));

  // Coverage from study guide lectures
  const sgLectures = sgLecturesByC[course.id] || [];
  const sgTotal = sgLectures.reduce((s, l) => s + (l.guide?.topics?.length || 0), 0);
  const sgDone  = sgLectures.reduce((s, l) => s + Object.values(l.understood || {}).filter(Boolean).length, 0);
  const sgPct   = sgTotal > 0 ? Math.round(sgDone / sgTotal * 100) : 0;
  const hasStudyGuide = sgLectures.some(l => l.status === 'ready');

  const sysPrompt = `You are a study coach helping the student prepare for their CUMULATIVE FINAL EXAM in ${course.name} in ${d} days. Current grade: ${course.currentGrade}%. Final exam weight: ${course.finalWeight}% of total grade. Grade goal: ${activeGoalLabel} (need ${gradeNeededForGoal > 0 ? gradeNeededForGoal + '%' : 'already secured'} on final). ${hasStudyGuide ? `Study guide coverage: ${sgPct}% of ${sgTotal} topics mastered.` : ''} Topics this semester: ${course.topics.map(t=>t.name).join(', ')}. Be concise, encouraging, and strategic.`;

  return (
    <div className="fade-in">
      <div className="flex items-center gap-3 mb-5">
        <button onClick={() => setSelected(null)}
          className="text-orange-600 hover:text-orange-800 font-semibold text-sm">← All Finals</button>
        <span className="text-gray-400">/</span>
        <span className="text-gray-700 font-semibold text-sm">{course.name}</span>
      </div>
      <div className="flex items-start justify-between mb-4">
        <div>
          <h1 className="text-xl font-bold text-gray-900">{course.emoji} {course.name}</h1>
          <div className="text-sm text-gray-500 mt-0.5">{course.code} · Final in {d} days · {course.finalDate ? new Date(course.finalDate+'T12:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric'}) : 'Date TBD'} · {course.finalWeight}% of grade</div>
        </div>
        <div className="flex items-center gap-2">
          <input ref={syllabusRef} type="file" accept=".pdf,.txt,.png,.jpg,.jpeg" className="hidden" onChange={handleSyllabusUpload} />
          {syllabusStatus === 'success' ? (
            <span className="text-xs text-green-700 font-semibold flex items-center gap-1 bg-green-50 border border-green-200 px-3 py-1.5 rounded-lg">✅ Syllabus loaded</span>
          ) : (
            <button onClick={() => { setSyllabusStatus(null); syllabusRef.current?.click(); }}
              className="btn-secondary text-xs flex items-center gap-1.5" disabled={syllabusUploading}>
              {syllabusUploading ? <><span style={{width:12,height:12,border:'1.5px solid #D5D1E6',borderTopColor:'#EB7100',borderRadius:'50%',display:'inline-block',animation:'spin 0.7s linear infinite'}}></span>Reading…</> : <>📄 Upload Syllabus</>}
            </button>
          )}
          {syllabusStatus === 'error' && <span className="text-xs text-red-500 ml-1">⚠️ Try again</span>}
        </div>
      </div>

      {/* Grade context bar — hidden once any study material has been uploaded or is generating */}
      {sgLectures.length === 0 && <div className="card p-4 mb-4 bg-gray-50">
        <div className="grid grid-cols-4 gap-3 text-center">
          <div>
            <div className="text-lg font-bold" style={{ color: course.currentGrade<80?'#dc2626':'#059669' }}>{course.currentGrade}%</div>
            <div className="text-xs text-gray-500">Current Grade</div>
          </div>
          <div>
            <div className="text-lg font-bold text-orange-700">{course.finalWeight}%</div>
            <div className="text-xs text-gray-500">Final Weight</div>
          </div>
          <div>
            <div className="flex flex-col items-center gap-1">
              <select
                value={activeTarget}
                onChange={e => setCourseGoal(parseInt(e.target.value))}
                className="text-sm font-bold text-orange-700 bg-transparent border border-orange-200 rounded-lg px-2 py-0.5 cursor-pointer focus:outline-none focus:border-orange-400 hover:border-orange-400 transition-all"
                style={{ maxWidth: '100%' }}>
                {GRADE_GOAL_OPTIONS.map(o => (
                  <option key={o.pct} value={o.pct}>{o.label}</option>
                ))}
              </select>
              <div className="text-xs text-gray-400 flex items-center gap-1">
                Goal {course.courseGoal != null && course.courseGoal !== profileTarget && <span className="text-orange-500 font-bold">· custom</span>}
                {course.courseGoal != null && course.courseGoal !== profileTarget && (
                  <button onClick={() => setCourseGoal(null)} className="text-gray-400 hover:text-red-500 text-xs ml-1" title="Reset to profile goal">↺</button>
                )}
              </div>
            </div>
          </div>
          <div>
            <div className="text-lg font-bold text-orange-700">
              {gradeNeededForGoal > 100 ? '✓' : gradeNeededForGoal <= 0 ? '✓' : gradeNeededForGoal + '%'}
            </div>
            <div className="text-xs text-gray-500">
              {gradeNeededForGoal > 100 ? 'Goal secured!' : gradeNeededForGoal <= 0 ? 'Goal secured!' : 'Needed on Final'}
            </div>
          </div>
        </div>
      </div>}

      {/* ── Inline Study Guide ── first-time: upload flow; returning: 2-panel study experience */}
      <StudyGuide
        courses={[course]}
        initialCourseId={course.id}
        inlineMode={true}
        apiKey={apiKey}
        profile={profile}
        initialLectures={sgLecturesByC[course.id] || []}
        onLecturesUpdate={(lecs) => setSgLecturesByC(prev => ({...prev, [course.id]: lecs}))}
        seedRawFiles={seedRawFiles}
        onSeedConsumed={onSeedConsumed}
      />

      <ChatPanel open={chatOpen} onClose={() => setChatOpen(false)} apiKey={apiKey}
        systemPrompt={sysPrompt} title={`Finals Coach: ${course.name}`}
        suggestions={[
          `What are the highest-priority topics for the final given I have ${d} days?`,
          `Connect the key themes across the whole semester for ${course.name}`,
          `I currently have ${course.currentGrade}%. What do I need to focus on to get a B?`,
          ...(course.topics.length > 0 ? [`Quiz me on ${course.topics.find(t=>!t.studied)?.name || course.topics[0]?.name || course.name}`] : [`What topics should I study for ${course.name}?`]),
          `What questions are most likely to appear on a cumulative final for ${course.name}?`
        ]} />
    </div>
  );
}

// ─── COURSE CARD (onboarding step 2) ─────────────────────────────────────────
function CourseCardOnboarding({ c, idx, loaded, isUploading, sStatus, onUpdate, onRemove, onSyllabusClick, canRemove }) {
  const [open, setOpen] = React.useState(idx === 0);
  return (
    <div style={{ borderRadius: 12, border: '1.5px solid #EDEAF4', background: '#FAFAFA', overflow: 'hidden' }}>
      {/* Primary row */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 14px' }}>
        <div style={{ width: 26, height: 26, borderRadius: '50%', background: loaded ? '#DCFCE7' : '#F3F4F6', color: loaded ? '#16A34A' : '#9CA3AF', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 700, flexShrink: 0 }}>
          {loaded ? '✓' : idx + 1}
        </div>
        <input value={c.name} onChange={e => onUpdate('name', e.target.value)} placeholder={`Course ${idx + 1} name`}
          style={{ flex: 1, background: 'transparent', border: 'none', outline: 'none', fontSize: 14, fontWeight: 600, color: '#1F2937', fontFamily: 'Inter, sans-serif' }} />
        <button onClick={onSyllabusClick} disabled={isUploading}
          style={{ fontSize: 11, fontWeight: 600, color: loaded ? '#16A34A' : '#EB7100', background: loaded ? '#F0FDF4' : '#FFF3E8', border: `1px solid ${loaded ? '#86EFAC' : '#FFBC80'}`, borderRadius: 8, padding: '4px 10px', cursor: isUploading ? 'wait' : 'pointer', whiteSpace: 'nowrap', fontFamily: 'Inter, sans-serif' }}>
          {isUploading ? '⏳' : loaded ? '✓ Syllabus' : '+ Syllabus'}
        </button>
        {canRemove && (
          <button onClick={onRemove} style={{ color: '#D1D5DB', background: 'none', border: 'none', cursor: 'pointer', fontSize: 18, lineHeight: 1, padding: '0 2px' }}>×</button>
        )}
      </div>

      {/* Tags row — shown when syllabus was loaded */}
      {loaded && (
        <div style={{ padding: '0 14px 10px 50px', display: 'flex', gap: 6, flexWrap: 'wrap' }}>
          {c.finalDate && <span style={{ fontSize: 11, background: '#FEF3C7', color: '#92400E', border: '1px solid #FDE68A', borderRadius: 6, padding: '2px 8px', fontWeight: 600 }}>📅 {c.finalDate}</span>}
          {c.finalWeight && <span style={{ fontSize: 11, background: '#EEF2FF', color: '#4338CA', border: '1px solid #C7D2FE', borderRadius: 6, padding: '2px 8px', fontWeight: 600 }}>{c.finalWeight}% final</span>}
          {c.topics && <span style={{ fontSize: 11, background: '#F0FDF4', color: '#166534', border: '1px solid #BBF7D0', borderRadius: 6, padding: '2px 8px', fontWeight: 600 }}>{c.topics.split(',').filter(t=>t.trim()).length} topics</span>}
        </div>
      )}

      {/* Expand toggle — only when no syllabus loaded */}
      {!loaded && (
        <div style={{ borderTop: '1px solid #F3F4F6' }}>
          <button onClick={() => setOpen(o => !o)}
            style={{ width: '100%', padding: '7px 14px 7px 50px', textAlign: 'left', background: 'none', border: 'none', cursor: 'pointer', fontSize: 12, color: '#9CA3AF', fontFamily: 'Inter, sans-serif', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <span>Add details manually →</span>
            <span style={{ transform: open ? 'rotate(90deg)' : 'rotate(0deg)', transition: 'transform 0.2s', display: 'inline-block', marginRight: 4 }}>›</span>
          </button>
        </div>
      )}

      {/* Expanded manual fields */}
      {open && !loaded && (
        <div style={{ padding: '4px 14px 14px 14px', display: 'flex', flexDirection: 'column', gap: 10, borderTop: '1px solid #F3F4F6' }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
            <div>
              <label style={{ fontSize: 10, fontWeight: 700, color: '#9CA3AF', display: 'block', marginBottom: 4, textTransform: 'uppercase', letterSpacing: '0.05em' }}>Final Date</label>
              <input type="date" value={c.finalDate} onChange={e => onUpdate('finalDate', e.target.value)}
                style={{ width: '100%', padding: '7px 10px', borderRadius: 8, border: '1px solid #E5E7EB', fontSize: 12, background: '#fff', fontFamily: 'Inter, sans-serif', boxSizing: 'border-box' }} />
            </div>
            <div>
              <label style={{ fontSize: 10, fontWeight: 700, color: '#9CA3AF', display: 'block', marginBottom: 4, textTransform: 'uppercase', letterSpacing: '0.05em' }}>Current Grade %</label>
              <input type="number" min="0" max="100" value={c.currentGrade} onChange={e => onUpdate('currentGrade', e.target.value)} placeholder="e.g. 82"
                style={{ width: '100%', padding: '7px 10px', borderRadius: 8, border: '1px solid #E5E7EB', fontSize: 12, background: '#fff', fontFamily: 'Inter, sans-serif', boxSizing: 'border-box' }} />
            </div>
            <div style={{ gridColumn: '1/-1' }}>
              <label style={{ fontSize: 10, fontWeight: 700, color: '#9CA3AF', display: 'block', marginBottom: 4, textTransform: 'uppercase', letterSpacing: '0.05em' }}>Final Weight %</label>
              <input type="number" min="0" max="100" value={c.finalWeight} onChange={e => onUpdate('finalWeight', e.target.value)} placeholder="e.g. 30"
                style={{ width: '100%', padding: '7px 10px', borderRadius: 8, border: '1px solid #E5E7EB', fontSize: 12, background: '#fff', fontFamily: 'Inter, sans-serif', boxSizing: 'border-box' }} />
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
