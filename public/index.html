function CourseSetupPage({ apiKey, initialCourses, onComplete }) {
  const [courses, setCourses] = useState(
    initialCourses && initialCourses.length > 0
      ? initialCourses
      : [{ id: 1, name: '', professor: '', finalDate: '', currentGrade: '', finalWeight: '', topics: '' }]
  );
  const [syllabusUploading, setSyllabusUploading] = useState(null);
  const [syllabusStatus, setSyllabusStatus] = useState({});
  const syllabusRef = useRef(null);
  const [syllabusTargetId, setSyllabusTargetId] = useState(null);
  const [dragging, setDragging] = useState(false);
  const [pickedFiles, setPickedFiles] = useState([]);
  const filePickerRef = useRef(null);

  const addCourse = () => setCourses(p => [...p, { id: Date.now(), name: '', professor: '', finalDate: '', currentGrade: '', finalWeight: '', topics: '' }]);
  const removeCourse = (id) => setCourses(p => p.filter(c => c.id !== id));
  const updateCourse = (id, field, val) => setCourses(p => p.map(c => c.id === id ? { ...c, [field]: val } : c));

  const buildCourses = () => courses.filter(c => c.name.trim()).map((c, i) => ({
    id: `user_${Date.now()}_${i}`,
    name: c.name.trim(), code: '', professor: (c.professor || '').trim(),
    finalDate: c.finalDate || null,
    currentGrade: parseInt(c.currentGrade) || 80,
    finalWeight: parseInt(c.finalWeight) || 30,
    officeHours: c.officeHours || '',
    gradingBreakdown: c.gradingBreakdown || [],
    quizDates: c.quizDates || [],
    assignments: c.assignments || [],
    emoji: COURSE_EMOJIS[i % COURSE_EMOJIS.length],
    color: COURSE_COLORS[i % COURSE_COLORS.length],
    topics: c.topics && c.topics.trim()
      ? c.topics.split(',').map((t, j) => ({ id: j+1, name: t.trim(), studied: false, mastery: 0 }))
      : [],
  }));

  const handleSyllabusUpload = async (e, courseId) => {
    const file = e.target.files[0];
    if (!file || !courseId) return;
    setSyllabusUploading(courseId);
    setSyllabusStatus(p => ({ ...p, [courseId]: null }));
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const isText = file.type === 'text/plain';
        const isImage = file.type.startsWith('image/');
        const base64 = isText ? null : ev.target.result.split(',')[1];
        let content;
        if (isText) content = ev.target.result;
        else if (isImage) content = [{ type: 'image', source: { type: 'base64', media_type: file.type, data: base64 } }, { type: 'text', text: 'Extract the course schedule information from this syllabus image.' }];
        else content = [{ type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: base64 } }, { type: 'text', text: 'Extract the course schedule information from this syllabus PDF.' }];

        const sys = `You are extracting structured information from a university course syllabus. Return ONLY a valid JSON object, no markdown, no code fences:
{"courseName":"","professor":"","finalDate":"YYYY-MM-DD or empty","finalWeight":25,"gradingBreakdown":[{"component":"string","weight":"string"}],"officeHours":"","topics":["topic 1","topic 2"]}`;
        const msgs = [{ role: 'user', content: isText
          ? `${content}\n\nExtract the course information and return the JSON object.`
          : [...(Array.isArray(content) ? content.slice(0,-1) : []), { type: 'text', text: 'Extract the course information and return the JSON object.' }] }];
        const reply = await callClaude(apiKey, sys, msgs);
        const clean = reply.replace(/```json\n?|\n?```/g, '').replace(/```\n?/g, '').trim();
        const data = JSON.parse(clean);
        setCourses(prev => prev.map(c => {
          if (c.id !== courseId) return c;
          return {
            ...c,
            name: data.courseName?.trim() || c.name,
            professor: data.professor?.trim() || c.professor,
            finalDate: data.finalDate || c.finalDate || '',
            finalWeight: data.finalWeight != null ? String(data.finalWeight) : c.finalWeight,
            gradingBreakdown: data.gradingBreakdown?.length ? data.gradingBreakdown : (c.gradingBreakdown || []),
            officeHours: data.officeHours || c.officeHours || '',
            topics: data.topics?.length ? data.topics.join(', ') : c.topics,
          };
        }));
        setSyllabusStatus(p => ({ ...p, [courseId]: 'success' }));
      } catch (_) {
        setSyllabusStatus(p => ({ ...p, [courseId]: 'error' }));
      }
      setSyllabusUploading(null);
      if (syllabusRef.current) syllabusRef.current.value = '';
    };
    if (file.type === 'text/plain') reader.readAsText(file);
    else reader.readAsDataURL(file);
  };

  const hasValidCourse = courses.some(c => c.name.trim());

  return (
    <div style={{ minHeight: '100vh', background: 'linear-gradient(135deg, #1e1b4b 0%, #4f46e5 50%, #7c3aed 100%)' }} className="flex justify-center p-6 scrollable" style={{ overflowY: 'auto' }}>
      <div style={{ maxWidth: 600, width: '100%' }}>
        {/* ── Combined value hero + branding ── */}
        <div className="card fade-in mb-4" style={{ background: 'linear-gradient(135deg, #302C41 0%, #1e1b4b 100%)', border: 'none', padding: '24px 26px 22px' }}>
          <div className="flex items-center gap-3 mb-4">
            <div style={{ width: 38, height: 38, borderRadius: 11, background: 'linear-gradient(135deg, #EB7100, #F59E0B)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20, flexShrink: 0 }}>🎓</div>
            <div>
              <div style={{ fontWeight: 800, color: 'white', fontSize: 16, letterSpacing: '-0.2px' }}>Finals Coach</div>
            </div>
          </div>
          <p style={{ fontSize: 15, fontWeight: 600, color: 'white', margin: '0 0 6px', lineHeight: 1.4, letterSpacing: '-0.2px' }}>
            Own your finals with a personalized study guide and plan
          </p>
          <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.55)', margin: '0 0 18px', lineHeight: 1.5 }}>
            Add your course
          </p>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            {[['📖','AI study guide'], ['📝','Practice quizzes'], ['📅','Day-by-day plan']].map(([icon, label]) => (
              <span key={label} style={{ fontSize: 12, fontWeight: 600, color: 'rgba(255,255,255,0.85)', background: 'rgba(255,255,255,0.10)', border: '1px solid rgba(255,255,255,0.18)', borderRadius: 99, padding: '5px 12px', display: 'inline-flex', alignItems: 'center', gap: 5 }}>
                {icon} {label}
              </span>
            ))}
          </div>
        </div>

        {/* Course Form Card */}
        <div className="card p-6 fade-in mb-4">
          <h2 style={{ fontSize: 16, fontWeight: 700, color: '#111827', margin: '0 0 14px', letterSpacing: '-0.2px' }}>Add your course</h2>

          <input ref={syllabusRef} type="file" accept=".pdf,.txt,.png,.jpg,.jpeg" className="hidden"
            onChange={e => handleSyllabusUpload(e, syllabusTargetId)} />

          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {courses.map((c, i) => {
              const sStatus = syllabusStatus[c.id];
              const isUploading = syllabusUploading === c.id;
              const loaded = sStatus === 'success';
              return (
                <CourseCardOnboarding key={c.id} c={c} idx={i} loaded={loaded} isUploading={isUploading} sStatus={sStatus}
                  onUpdate={(field, val) => updateCourse(c.id, field, val)}
                  onRemove={() => removeCourse(c.id)}
                  onSyllabusClick={() => { setSyllabusTargetId(c.id); setTimeout(() => syllabusRef.current?.click(), 50); }}
                  canRemove={courses.length > 1} />
              );
            })}
          </div>

        </div>

        {/* Upload Study Material Card */}
        <div className="card fade-in mb-4" style={{ overflow: 'hidden' }}>
          <div style={{ padding: '18px 22px 14px', borderBottom: '1px solid #F3F4F6' }}>
            <h3 style={{ fontSize: 15, fontWeight: 700, color: '#111827', margin: '0 0 3px' }}>Upload your study materials</h3>
            <p style={{ fontSize: 13, color: '#6B7280', margin: 0, lineHeight: 1.45 }}>Upload your lecture slides, notes, or recordings</p>
          </div>

          {/* Hidden file input */}
          <input ref={filePickerRef} type="file" multiple accept=".pdf,.txt,.png,.jpg,.jpeg,.pptx,.docx,.vtt,.srt,.mp3,.wav,.m4a" style={{display:'none'}}
            onChange={e => {
              const added = Array.from(e.target.files).map(f => ({ id: Math.random().toString(36).slice(2), name: f.name, file: f }));
              setPickedFiles(p => [...p, ...added]);
              e.target.value = '';
            }} />

          {/* Dropzone */}
          <div
            onDragOver={e => { e.preventDefault(); setDragging(true); }}
            onDragLeave={() => setDragging(false)}
            onDrop={e => {
              e.preventDefault(); setDragging(false);
              const added = Array.from(e.dataTransfer.files).map(f => ({ id: Math.random().toString(36).slice(2), name: f.name, file: f }));
              setPickedFiles(p => [...p, ...added]);
            }}
            style={{
              margin: '16px 20px', borderRadius: 16,
              border: `2px dashed ${dragging ? '#EB7100' : pickedFiles.length > 0 ? '#EB7100' : '#D1D5DB'}`,
              background: dragging ? '#FFF3E8' : pickedFiles.length > 0 ? '#FFF8F0' : '#F9FAFB',
              padding: '28px 24px', textAlign: 'center', transition: 'all 0.15s'
            }}>
            {pickedFiles.length === 0 ? (
              <>
                <div style={{ fontSize: 34, marginBottom: 8 }}>📂</div>
                <p style={{ fontWeight: 600, color: '#374151', margin: '0 0 3px', fontSize: 15 }}>Drop all your files here</p>
                <p style={{ fontSize: 13, color: '#9CA3AF', margin: '0 0 14px' }}>
                  or <span onClick={() => filePickerRef.current?.click()} style={{ color: '#EB7100', textDecoration: 'underline', cursor: 'pointer' }}>browse</span>
                </p>
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', justifyContent: 'center' }}>
                  {[['📄','Lecture Slides'],['📝','Lecture Notes'],['✍️','Handwritten Notes'],['🎙️','Audio Transcript'],['📋','Practice Quizzes']].map(([icon, lbl]) => (
                    <span key={lbl} style={{ fontSize: 12, background: 'white', border: '1px solid #E5E7EB', borderRadius: 99, padding: '5px 12px', color: '#6B7280', fontWeight: 500 }}>{icon} {lbl}</span>
                  ))}
                </div>
              </>
            ) : (
              <>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 12, maxHeight: 160, overflowY: 'auto' }}>
                  {pickedFiles.map(f => (
                    <div key={f.id} style={{ display: 'flex', alignItems: 'center', gap: 8, background: 'white', borderRadius: 8, padding: '7px 10px', border: '1px solid #E5E7EB' }}>
                      <span style={{ fontSize: 14 }}>📄</span>
                      <span style={{ flex: 1, fontSize: 12, color: '#374151', textAlign: 'left', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{f.name}</span>
                      <button onClick={() => setPickedFiles(p => p.filter(x => x.id !== f.id))}
                        style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#9CA3AF', fontSize: 14, lineHeight: 1, padding: 0 }}>✕</button>
                    </div>
                  ))}
                </div>
                <button onClick={() => filePickerRef.current?.click()}
                  style={{ fontSize: 12, color: '#EB7100', background: 'none', border: 'none', cursor: 'pointer', textDecoration: 'underline', fontFamily: 'inherit' }}>
                  + Add more files
                </button>
              </>
            )}
          </div>

          {/* File type guide */}
          {pickedFiles.length === 0 && (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12, padding: '0 20px 18px' }}>
              {[['📄 Slides','PDF or PowerPoint (.pptx); exports from Canvas, Blackboard, or email'],
                ['📝 Notes','Typed notes, scanned PDFs, text files, handwritten scans'],
                ['🎙️ Audio Transcript','Caption or transcript files: .vtt, .srt, or .txt/.md with "transcript" in the file name']].map(([t, d]) => (
                <div key={t} style={{ textAlign: 'center', padding: '12px 10px', background: '#F9FAFB', borderRadius: 12 }}>
                  <p style={{ fontSize: 13, fontWeight: 600, color: '#374151', margin: '0 0 3px' }}>{t}</p>
                  <p style={{ fontSize: 11, color: '#9CA3AF', margin: 0, lineHeight: 1.45 }}>{d}</p>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* CTAs */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 24 }}>
          <button
            onClick={() => { if (hasValidCourse) onComplete(buildCourses(), 'finals', pickedFiles.map(p => p.file).filter(Boolean)); }}
            disabled={!hasValidCourse}
            style={{ width: '100%', padding: '14px', borderRadius: 14, background: hasValidCourse ? 'linear-gradient(135deg, #EB7100, #F59E0B)' : '#D1D5DB', border: 'none', color: '#fff', fontSize: 15, fontWeight: 700, cursor: hasValidCourse ? 'pointer' : 'not-allowed', fontFamily: 'Inter, sans-serif', boxShadow: hasValidCourse ? '0 4px 14px rgba(235,113,0,0.35)' : 'none' }}>
            {hasValidCourse ? '✨ Generate study guide' : 'Add at least one course to continue'}
          </button>
          {hasValidCourse && (
            <button
              onClick={() => onComplete(buildCourses(), 'dashboard')}
              style={{ width: '100%', padding: '11px', borderRadius: 14, background: 'transparent', border: '1.5px solid rgba(255,255,255,0.25)', color: 'rgba(255,255,255,0.7)', fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'Inter, sans-serif' }}>
              Skip to Dashboard
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── STUDY GUIDE (v2) ─────────────────────────────────────────────────────────

const SG_ICONS = { pdf: '📄', image: '🖼️', text: '📝', audio: '🎙️' };

const sgReadFiles = (fileList) => Promise.all(Array.from(fileList).map(f => new Promise(res => {
  const isAudio = /\.(mp3|wav|m4a|ogg|aac)$/i.test(f.name) || f.type.startsWith('audio/');
  if (isAudio) { res({ id: Math.random().toString(36).slice(2,8), name: f.name, type: 'audio', content: null, mediaType: null }); return; }
  const r = new FileReader();
  const isPDF = f.type === 'application/pdf', isImg = f.type.startsWith('image/');
  if (isPDF || isImg) {
    r.onload = e => res({ id: Math.random().toString(36).slice(2,8), name: f.name, type: isPDF?'pdf':'image', content: e.target.result.split(',')[1], mediaType: f.type });
    r.readAsDataURL(f);
  } else {
    r.onload = e => res({ id: Math.random().toString(36).slice(2,8), name: f.name, type: 'text', content: e.target.result, mediaType: null });
    r.readAsText(f);
  }
})));

);

// ─── QUIZ UI (shared by StudyGuide) ──────────────────────────────────────────
function QuizUI({ quiz, answers, submitted, onAnswer, onSubmit, onReset }) {
  const score = submitted ? answers.filter((a, i) => a === quiz.questions[i].answer).length : 0;
  const pct   = quiz.questions.length ? Math.round(score / quiz.questions.length * 100) : 0;
  return (
    <div className="space-y-4">
      {submitted && (
        <div className={`rounded-xl px-4 py-3 flex items-center justify-between ${pct >= 70 ? 'bg-green-50 border border-green-200' : 'bg-amber-50 border border-amber-200'}`}>
          <div>
            <p className={`font-bold text-lg ${pct >= 70 ? 'text-green-800' : 'text-amber-800'}`}>Score: {score}/{quiz.questions.length} ({pct}%)</p>
            <p className={`text-xs mt-0.5 ${pct >= 70 ? 'text-green-600' : 'text-amber-600'}`}>{pct >= 80 ? '🎉 Great job!' : pct >= 60 ? '📚 Keep reviewing!' : '🔄 Review key concepts and try again'}</p>
          </div>
          <button onClick={onReset} className="btn-secondary text-xs py-1.5 px-3">Try Again</button>
        </div>
      )}
      {quiz.questions.map((q, qi) => {
        const ans = answers[qi];
        let rowCls = 'border-gray-200 bg-white';
        if (submitted) rowCls = ans === q.answer ? 'border-green-200 bg-green-50' : 'border-red-200 bg-red-50';
        return (
          <div key={qi} className={`rounded-xl border-2 p-4 ${rowCls}`}>
            <p className="text-sm font-semibold text-gray-800 mb-2">
              <span className="text-orange-500 font-bold mr-1">Q{qi + 1}.</span>{q.q}
            </p>
            <div className="space-y-1.5">
              {q.options.map((opt, oi) => {
                let cls = 'border-gray-200 bg-white text-gray-700 hover:border-orange-300 hover:bg-orange-50';
                if (submitted) {
                  if (oi === q.answer) cls = 'border-green-400 bg-green-100 text-green-800 font-semibold';
                  else if (oi === ans)  cls = 'border-red-400 bg-red-100 text-red-700';
                  else                  cls = 'border-gray-100 bg-gray-50 text-gray-400';
                } else if (ans === oi)  cls = 'border-orange-500 bg-orange-50 text-orange-700 font-semibold';
                return (
                  <button key={oi} onClick={() => !submitted && onAnswer(qi, oi)}
                    className={`w-full text-left px-3 py-2 rounded-lg border-2 text-sm transition-all ${cls} ${submitted ? 'cursor-default' : 'cursor-pointer'}`}>
                    <span className="font-mono text-xs mr-2 opacity-60">{String.fromCharCode(65 + oi)}.</span>{opt}
                  </button>
                );
              })}
            </div>
            {submitted && (
              <div className="mt-2 flex gap-2 items-start pt-2 border-t border-gray-200">
                <span className="flex-shrink-0">{ans === q.answer ? '✅' : '❌'}</span>
                <p className="text-xs text-gray-600">{q.explanation}</p>
              </div>
            )}
          </div>
        );
      })}
      {!submitted && (
        <button onClick={onSubmit} disabled={answers.some(a => a === null)} className="btn-primary w-full disabled:opacity-40">
          Submit Quiz ({answers.filter(a => a !== null).length}/{quiz.questions.length} answered)
        </button>
      )}
    </div>
  );
}

function StudyGuide({ courses, apiKey, initialCourseId, inlineMode, onLecturesUpdate, initialLectures, profile, seedRawFiles, onSeedConsumed }) {
  const [courseId, setCourseId] = useState(initialCourseId || courses[0]?.id || null);
  // Restore to study phase if persisted lectures exist for this course
  const _hasPersistedLectures = initialLectures?.some(l => l.status === 'ready' || l.status === 'processing');
  const [phase, setPhase] = useState(_hasPersistedLectures ? 'study' : 'upload');
  const [files, setFiles] = useState([]);
  const [dragging, setDragging] = useState(false);
  const [grouping, setGrouping] = useState(false);
  const [groups, setGroups] = useState([]);
  const [lectures, setLectures] = useState(_hasPersistedLectures ? (initialLectures || []) : []);
  const [generating, setGenerating] = useState(false);
  const [genProgress, setGenProgress] = useState(0);
  const [selLecId, setSelLecId] = useState('__all__');
  const [mode, setMode] = useState('summary');
  const [deck, setDeck] = useState([]);
  const [cardIdx, setCardIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [gotIt, setGotIt] = useState(new Set());
  const [reviewAgain, setReviewAgain] = useState(new Set());
  const [deckDone, setDeckDone] = useState(false);
  const [courseQuiz, setCourseQuiz] = useState(null);
  const [courseQuizAnswers, setCourseQuizAnswers] = useState([]);
  const [courseQuizSubmitted, setCourseQuizSubmitted] = useState(false);
  const [courseQuizLoading, setCourseQuizLoading] = useState(false);
  const [addingMore, setAddingMore] = useState(false); // true = "upload new source" flow, keep existing lectures
  const fileRef = useRef(null);
  const addMoreSourcesRef = useRef(null);

  const parseJSON = t => JSON.parse(t.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim());

  const buildContent = (fls, title) => {
    const parts = [{ type: 'text', text: `Study materials for: ${title}` }];
    fls.forEach(f => {
      if (f.type === 'audio') {
        parts.push({ type: 'text', text: `[Audio recording: ${f.name}; transcription not available, use context from other materials]` });
      } else if (f.type === 'text') {
        parts.push({ type: 'text', text: `\n--- ${f.name} ---\n${f.content}` });
      } else if (f.type === 'pdf') {
        parts.push({ type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: f.content } });
      } else {
        // image
        parts.push({ type: 'image', source: { type: 'base64', media_type: f.mediaType, data: f.content } });
      }
    });
    return parts;
  };

  const handleDrop = async (e) => {
    e.preventDefault(); setDragging(false);
    const newFs = await sgReadFiles(e.dataTransfer.files);
    setFiles(prev => { const names = new Set(prev.map(f => f.name)); return [...prev, ...newFs.filter(f => !names.has(f.name))]; });
  };

  const handleFileInput = async (e) => {
    const newFs = await sgReadFiles(e.target.files);
    setFiles(prev => { const names = new Set(prev.map(f => f.name)); return [...prev, ...newFs.filter(f => !names.has(f.name))]; });
    e.target.value = '';
  };

  const autoGroup = async () => {
    if (!files.length) return;
    setGrouping(true);
    try {
      const list = files.map((f, i) => `${i}: ${f.name}`).join('\n');
      const sys = `Group these study files by lecture. Return ONLY valid JSON:
{"groups":[{"label":"Lecture 1: Topic Name","indices":[0,2]}]}
Use file names to detect lecture numbers. Keep labels concise (max 40 chars). If unable to determine lecture groupings, put everything in one group.`;
      const raw = await callAPI(apiKey, sys, [{ role: 'user', content: `Group these files by lecture:\n${list}` }], 1000);
      const { groups: g } = parseJSON(raw);
      const mapped = g.map((gr, i) => ({
        id: `g${i}`, label: gr.label,
        fileIds: gr.indices.map(idx => files[idx]?.id).filter(Boolean)
      }));
      const assigned = new Set(mapped.flatMap(g => g.fileIds));
      const unassigned = files.filter(f => !assigned.has(f.id));
      if (unassigned.length) mapped.push({ id: 'gx', label: 'Other Materials', fileIds: unassigned.map(f => f.id) });
      setGroups(mapped);
    } catch(e) {
      setGroups([{ id: 'g0', label: 'All Materials', fileIds: files.map(f => f.id) }]);
    }
    setGrouping(false);
    setPhase('grouping');
  };

  const generateAll = async () => {
    setGenerating(true);
    setGenProgress(0);
    const lecs = groups.map(g => ({
      id: `${g.id}_${Date.now()}`, label: g.label,
      files: files.filter(f => g.fileIds.includes(f.id)),
      status: 'pending', guide: null, quiz: null, quizLoading: false,
      understood: {}, quizAnswers: [], quizSubmitted: false
    }));
    if (addingMore) {
      setLectures(prev => [...prev, ...lecs]);
    } else {
      setLectures(lecs);
    }
    setAddingMore(false);
    setPhase('study');
    setSelLecId('__all__');
    setMode('summary');

    for (let i = 0; i < lecs.length; i++) {
      const lec = lecs[i];
      setLectures(prev => prev.map(l => l.id === lec.id ? { ...l, status: 'processing' } : l));
      try {
        const sys = `You are an expert study guide generator. Analyze ALL provided materials and return a comprehensive, exam-focused study guide.
Return ONLY valid JSON, no markdown:
{"title":"Specific lecture title based on content","topics":[{"name":"Topic Name","summary":"2-3 sentence overview","concepts":["specific concept or key fact","another concept","formula or definition if relevant"]}]}
Rules: 3-6 topics, 4-6 concepts each, be specific and exam-focused.`;
        const raw = await callAPI(apiKey, sys, [{ role: 'user', content: buildContent(lec.files, lec.label) }]);
        const guide = parseJSON(raw);
        setLectures(prev => prev.map(l => l.id === lec.id ? { ...l, guide, status: 'ready', label: guide.title || lec.label } : l));
      } catch(e) {
        setLectures(prev => prev.map(l => l.id === lec.id ? { ...l, status: 'error' } : l));
      }
      setGenProgress(Math.round((i + 1) / lecs.length * 100));
    }
    setGenerating(false);
  };

  // Auto-generate when coming from CourseSetupPage (seedRawFiles !== null)
  useEffect(() => {
    if (seedRawFiles === null || _hasPersistedLectures) return;
    if (onSeedConsumed) onSeedConsumed();
    const course = courses[0];
    const run = async () => {
      let processed = [];
      if (seedRawFiles.length > 0) {
        try { processed = await sgReadFiles(seedRawFiles); } catch(e) {}
      }
      // If no files uploaded, synthesize from course info
      if (processed.length === 0 && course) {
        const topicsText = course.topics?.length > 0
          ? `\nKey Topics: ${course.topics.map(t => t.name).join(', ')}`
          : '';
        const info = `Course: ${course.name}\nFinal Exam: ${course.finalDate ? 'on ' + course.finalDate : 'date TBD'} (${daysUntil(course.finalDate)} days away)\nFinal Weight: ${course.finalWeight}% of grade\nCurrent Grade: ${course.currentGrade}%${topicsText}\n\nPlease generate a comprehensive study guide covering the key topics and concepts students need to master for this course.`;
        processed = [{ id: 'course-info', name: (course.name || 'Course') + ' - Overview', type: 'text', content: info, mediaType: null }];
      }
      if (!processed.length) return;
      const lecLabel = processed.length === 1 && processed[0].id === 'course-info'
        ? `${course?.name || 'Course'} Study Guide`
        : processed.length === 1 ? processed[0].name : 'Your Study Materials';
      const lec = { id: `auto_${Date.now()}`, label: lecLabel, files: processed, status: 'processing', guide: null, quiz: null, quizLoading: false, understood: {}, quizAnswers: [], quizSubmitted: false };
      setFiles(processed);
      setLectures([lec]);
      setAddingMore(false);
      setPhase('study');
      setSelLecId('__all__');
      setMode('summary');
      setGenerating(true);
      setGenProgress(0);
      try {
        const sys = `You are an expert study guide generator. Analyze ALL provided materials and return a comprehensive, exam-focused study guide.
Return ONLY valid JSON, no markdown:
{"title":"Specific title based on content","topics":[{"name":"Topic Name","summary":"2-3 sentence overview","concepts":["specific concept or key fact","another concept","formula or definition if relevant"]}]}
Rules: 3-6 topics, 4-6 concepts each, be specific and exam-focused.`;
        const raw = await callAPI(apiKey, sys, [{ role: 'user', content: buildContent(processed, lecLabel) }]);
        const guide = parseJSON(raw);
        setLectures([{ ...lec, guide, status: 'ready', label: guide.title || lecLabel }]);
      } catch(e) {
        setLectures([{ ...lec, status: 'error' }]);
      }
      setGenProgress(100);
      setGenerating(false);
    };
    run();
  }, []); // eslint-disable-line react-hooks/exhaustive-deps

  // Rebuild flashcard deck whenever lectures change
  useEffect(() => {
    const readyLecs = lectures.filter(l => l.status === 'ready' && l.guide);
    const cards = readyLecs.flatMap(lec =>
      (lec.guide?.topics || []).map(t => ({
        id: `${lec.id}-${t.name}`,
        lecId: lec.id, lecLabel: lec.label,
        topicName: t.name, summary: t.summary, concepts: t.concepts
      }))
    );
    setDeck(cards);
  }, [lectures]);

  // Reset card position when lecture filter changes
  useEffect(() => { setCardIdx(0); setFlipped(false); setDeckDone(false); }, [selLecId]);
  // Notify parent (FinalsPrep) whenever lectures change, so coverage bar stays in sync
  useEffect(() => { if (onLecturesUpdate) onLecturesUpdate(lectures); }, [lectures]);

  const activeDeck = selLecId === '__all__' ? deck : deck.filter(c => c.lecId === selLecId);

  const markCard = (wasGotIt) => {
    const card = activeDeck[cardIdx];
    if (!card) return;
    if (wasGotIt) setGotIt(p => new Set([...p, card.id]));
    else setReviewAgain(p => new Set([...p, card.id]));
    setFlipped(false);
    if (cardIdx + 1 < activeDeck.length) setCardIdx(p => p + 1);
    else setDeckDone(true);
  };

  const generateQuiz = async (lecId) => {
    const lec = lectures.find(l => l.id === lecId);
    if (!lec?.guide) return;
    setLectures(prev => prev.map(l => l.id === lecId ? { ...l, quizLoading: true } : l));
    try {
      const ctx = lec.guide.topics.map(t => `${t.name}: ${t.summary} Key points: ${t.concepts.join('; ')}`).join('\n\n');
      const sys = `Generate a rigorous practice quiz. Return ONLY valid JSON, no markdown:
{"questions":[{"q":"Question?","options":["A","B","C","D"],"answer":0,"explanation":"Why correct","topic":"Topic Name"}]}
Generate 6-8 varied questions (recall, conceptual, application). answer is the 0-based index of the correct option.`;
      const raw = await callAPI(apiKey, sys, [{ role: 'user', content: `Quiz for: ${lec.label}\n\n${ctx}` }]);
      const quiz = parseJSON(raw);
      setLectures(prev => prev.map(l => l.id === lecId ? { ...l, quiz, quizLoading: false, quizAnswers: new Array(quiz.questions.length).fill(null), quizSubmitted: false } : l));
    } catch(e) {
      setLectures(prev => prev.map(l => l.id === lecId ? { ...l, quizLoading: false } : l));
    }
  };

  const generateCourseQuiz = async () => {
    const readyLecs = lectures.filter(l => l.status === 'ready' && l.guide);
    if (!readyLecs.length) return;
    setCourseQuizLoading(true);
    try {
      const ctx = readyLecs.map(l =>
        `${l.label}:\n${l.guide.topics.map(t => `${t.name}: ${t.summary} Key points: ${t.concepts.join('; ')}`).join('\n')}`
      ).join('\n\n');
      const sys = `Generate a comprehensive course quiz covering all lectures. Return ONLY valid JSON, no markdown:
{"questions":[{"q":"Question?","options":["A","B","C","D"],"answer":0,"explanation":"Why correct","topic":"Topic Name"}]}
Generate 10-12 varied questions spanning multiple lectures. answer is the 0-based index of the correct option.`;
      const raw = await callAPI(apiKey, sys, [{ role:'user', content:`Full course quiz:\n\n${ctx}` }]);
      const quiz = parseJSON(raw);
      setCourseQuiz(quiz);
      setCourseQuizAnswers(new Array(quiz.questions.length).fill(null));
      setCourseQuizSubmitted(false);
    } catch(e) { console.error(e); }
    setCourseQuizLoading(false);
  };

  const regenerateLecture = async (lecId) => {
    const lec = lectures.find(l => l.id === lecId);
    if (!lec) return;
    setLectures(prev => prev.map(l => l.id === lecId ? {...l, status:'processing'} : l));
    try {
      const sys = `You are an expert study guide generator. Analyze ALL provided materials and return a comprehensive, exam-focused study guide.
Return ONLY valid JSON, no markdown:
{"title":"Specific lecture title based on content","topics":[{"name":"Topic Name","summary":"2-3 sentence overview","concepts":["specific concept or key fact","another concept","formula or definition if relevant"]}]}
Rules: 3-6 topics, 4-6 concepts each, be specific and exam-focused.`;
      const raw = await callAPI(apiKey, sys, [{ role:'user', content: buildContent(lec.files, lec.label) }]);
      const guide = parseJSON(raw);
      setLectures(prev => prev.map(l => l.id === lecId ? {...l, guide, status:'ready', label: guide.title||lec.label} : l));
    } catch(e) {
      setLectures(prev => prev.map(l => l.id === lecId ? {...l, status:'error'} : l));
    }
  };

  const handleAddSources = async (e) => {
    if (!selLecId || selLecId === '__all__') return;
    const newFs = await sgReadFiles(e.target.files);
    setLectures(prev => prev.map(l => l.id === selLecId
      ? { ...l, files: [...(l.files||[]), ...newFs.filter(f => !(l.files||[]).find(x=>x.name===f.name))] }
      : l));
    e.target.value = '';
  };

  // ── Shared header component ─────────────────────────────────────────────────
  const CourseHeader = ({ extra }) => {
    // In inline mode (embedded on Finals Prep page), hide the standalone Study Guide header
    if (inlineMode) return extra
      ? <div style={{display:'flex', justifyContent:'flex-end', marginBottom:12}}>{extra}</div>
      : null;
    return (
      <div className="flex items-center justify-between mb-5">
        <div className="flex items-center gap-3">
          <h1 className="text-xl font-bold text-gray-900">📚 Study Guide</h1>
          <select value={courseId} onChange={e => { setCourseId(e.target.value); setPhase('upload'); setFiles([]); setGroups([]); setLectures([]); setDeck([]); }}
            className="px-3 py-1.5 rounded-xl border border-gray-200 text-sm bg-white font-medium text-gray-700 focus:border-orange-400">
            {courses.map(c => <option key={c.id} value={c.id}>{c.code ? `${c.code}: ` : ''}{c.name}</option>)}
          </select>
        </div>
        {extra}
      </div>
    );
  };

  // ── Phase: upload ───────────────────────────────────────────────────────────
  if (phase === 'upload') return (
    <div>
      <CourseHeader />
      <div className="card p-8">
        <div className="text-center mb-6">
          <h2 className="text-lg font-bold text-gray-900">{addingMore ? 'Add more sources' : 'Upload all your study materials'}</h2>
          <p className="text-sm text-gray-500 mt-1 leading-relaxed">
            {addingMore
              ? 'These new files will be grouped and added alongside your existing study guides.'
              : 'Your study guide will be generated automatically once you upload your materials.'}
          </p>
          {!addingMore && (
            <p className="text-xs mt-2 text-orange-600 font-medium">
              💡 Use clear file names like <span className="font-semibold">Lecture3_SQL.pdf</span> or <span className="font-semibold">Week2_Notes.txt</span>. Finals Coach uses them to group and label your study guide more accurately.
            </p>
          )}
        </div>
        <div onDragOver={e => { e.preventDefault(); setDragging(true); }} onDragLeave={() => setDragging(false)}
          onDrop={handleDrop} onClick={() => fileRef.current?.click()}
          className={`flex flex-col items-center gap-4 rounded-2xl border-2 border-dashed px-8 py-12 cursor-pointer transition-all mb-6
            ${dragging ? 'border-orange-400 bg-orange-50' : 'border-gray-300 bg-gray-50 hover:border-orange-400 hover:bg-orange-50'}`}>
          <input ref={fileRef} type="file" multiple accept=".pdf,.txt,.png,.jpg,.jpeg,.mp3,.wav,.m4a" className="hidden" onChange={handleFileInput} />
          <div className="text-4xl">📂</div>
          <div className="text-center">
            <p className="font-semibold text-gray-700">Drop all your files here</p>
            <p className="text-sm text-gray-400 mt-0.5">or <span className="text-orange-600 underline">browse</span></p>
          </div>
          <div className="flex gap-2 flex-wrap justify-center">
            {[['📄','Lecture Slides'],['📝','Lecture Notes'],['✍️','Handwritten Notes'],['🎙️','Audio Recordings'],['📋','Practice Quizzes']].map(([icon, lbl]) => (
              <span key={lbl} className="text-xs bg-white border border-gray-200 rounded-full px-3 py-1.5 text-gray-600 font-medium">{icon} {lbl}</span>
            ))}
          </div>
        </div>
        {files.length > 0 ? (
          <div className="space-y-3">
            <div className="flex items-center justify-between">
              <p className="text-xs font-bold text-gray-500 uppercase tracking-wider">{files.length} file{files.length !== 1 ? 's' : ''} ready</p>
              <button onClick={() => setFiles([])} className="text-xs text-red-400 hover:text-red-600">Clear all</button>
            </div>
            <div className="space-y-1.5 max-h-52 overflow-y-auto">
              {files.map(f => (
                <div key={f.id} className="flex items-center gap-3 bg-gray-50 rounded-lg px-3 py-2">
                  <span>{SG_ICONS[f.type] || '📎'}</span>
                  <p className="flex-1 text-sm text-gray-700 truncate">{f.name}</p>
                  <button onClick={e => { e.stopPropagation(); setFiles(p => p.filter(x => x.id !== f.id)); }}
                    className="text-gray-300 hover:text-red-400 transition-colors">✕</button>
                </div>
              ))}
            </div>
            <button onClick={autoGroup} disabled={grouping} className="btn-primary w-full flex items-center justify-center gap-2 mt-2">
              {grouping
                ? <><span style={{width:16,height:16,border:'2px solid rgba(255,255,255,0.4)',borderTopColor:'white',borderRadius:'50%',display:'inline-block',animation:'spin 0.7s linear infinite'}}></span>Grouping files…</>
                : '✨ Generate study guide →'}
            </button>
          </div>
        ) : (
          <div className="grid grid-cols-3 gap-4">
            {[['📄 Slides','PDF exported from Canvas, Blackboard, or email'],
              ['📝 Notes','Typed notes, scanned PDFs, text files, handwritten scans'],
              ['🎙️ Audio','Lecture recordings (MP3, WAV, M4A), noted but not transcribed yet']].map(([t, d]) => (
              <div key={t} className="text-center p-4 bg-gray-50 rounded-xl">
                <p className="text-sm font-semibold text-gray-700">{t}</p>
                <p className="text-xs text-gray-400 mt-1 leading-relaxed">{d}</p>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );

  // ── Phase: grouping ─────────────────────────────────────────────────────────
  if (phase === 'grouping') return (
    <div>
      <CourseHeader />
      <div className="card p-6">
        <div className="mb-5">
          <h2 className="text-lg font-bold text-gray-900">Confirm groupings</h2>
          <p className="text-sm text-gray-500 mt-0.5">Finals Coach grouped your files by lecture. Rename any label or continue.</p>
        </div>
        <div className="space-y-3 mb-6">
          {groups.map(g => (
            <div key={g.id} className="border border-gray-200 rounded-xl p-4 bg-gray-50">
              <input value={g.label}
                onChange={e => setGroups(p => p.map(x => x.id === g.id ? { ...x, label: e.target.value } : x))}
                className="w-full text-sm font-semibold text-gray-800 bg-transparent border-b border-transparent hover:border-gray-300 focus:border-orange-400 focus:outline-none py-0.5 mb-2" />
              <div className="flex flex-wrap gap-1.5">
                {g.fileIds.map(fid => {
                  const f = files.find(x => x.id === fid);
                  return f ? (
                    <span key={fid} className="text-xs bg-white border border-gray-200 rounded-full px-2 py-0.5 text-gray-600 flex items-center gap-1">
                      {SG_ICONS[f.type] || '📎'} {f.name}
                    </span>
                  ) : null;
                })}
              </div>
            </div>
          ))}
        </div>
        <div className="flex gap-3">
          <button onClick={() => setPhase('upload')} className="btn-secondary">← Back</button>
          <button onClick={generateAll} className="btn-primary flex-1">
            ✨ Generate study guide
          </button>
        </div>
      </div>
    </div>
  );

  // ── Phase: study ────────────────────────────────────────────────────────────
  const getMastery = (lec) => {
    if (!lec.guide?.topics?.length) return 0;
    const done = Object.values(lec.understood || {}).filter(Boolean).length;
    return Math.round((done / lec.guide.topics.length) * 100);
  };

  const selectedLec = selLecId !== '__all__' ? lectures.find(l => l.id === selLecId) : null;

  // Concepts to review: wrong answers from submitted quizzes
  const reviewTopics = lectures.flatMap(l => {
    if (!l.quiz || !l.quizSubmitted) return [];
    return l.quiz.questions
      .filter((q, i) => l.quizAnswers[i] !== q.answer)
      .map(q => ({ topic: q.topic || 'General', lecLabel: l.label, question: q.q, explanation: q.explanation, correctAnswer: q.options[q.answer] }));
  });

  // Mock professor-shared quizzes
  const profQuizzes = [
    { id:'pq1', title:'Midterm Review Quiz', date:'Apr 15', questions:10, shared:'Prof. Holt' },
    { id:'pq2', title:'Chapter 5–7 Practice Set', date:'Apr 20', questions:8, shared:'Prof. Holt' },
  ];

  // ── Study phase computed helpers ─────────────────────────────────────────────
  const curCourse = courses.find(c => c.id === courseId);
  const readyLecs = lectures.filter(l => l.status === 'ready');
  const overallMastery = readyLecs.length
    ? Math.round(readyLecs.reduce((s, l) => s + getMastery(l), 0) / readyLecs.length)
    : 0;
  const completedLecs = readyLecs.filter(l => getMastery(l) >= 70);
  const needsReviewLecs = readyLecs.filter(l => getMastery(l) > 0 && getMastery(l) < 70);
  const notStartedLecs = readyLecs.filter(l => getMastery(l) === 0);
  const nextLec = readyLecs.length
    ? readyLecs.reduce((a, b) => getMastery(a) <= getMastery(b) ? a : b)
    : null;
  // Group non-error lectures into units of 5
  const nonErrLecs = lectures.filter(l => l.status !== 'error');
  const unitGroups = [];
  for (let i = 0; i < nonErrLecs.length; i += 5) {
    unitGroups.push({ label: `Unit ${Math.floor(i / 5) + 1}`, lecs: nonErrLecs.slice(i, i + 5) });
  }

  return (
    <div>
      <CourseHeader />

      {/* Generation progress banner */}
      {generating && (
        <div className="card p-4 mb-4">
          <div className="flex items-center gap-3 mb-2">
            <Spinner />
            <p className="text-sm font-semibold text-gray-800">Building your study guides… {genProgress}%</p>
          </div>
          <div className="progress-bar h-1.5 mb-2">
            <div className="progress-fill" style={{width:`${genProgress}%`,background:'#EB7100'}}></div>
          </div>
          <div className="flex flex-wrap gap-x-4 gap-y-1 mt-1">
            {lectures.map(l => (
              <span key={l.id} className="text-xs text-gray-500 flex items-center gap-1">
                {l.status==='ready'?'✅':l.status==='error'?'❌':l.status==='processing'?<Spinner size={8} stroke="1.5px" />:'○'} {l.label}
              </span>
            ))}
          </div>
        </div>
      )}

      {/* Two-panel study layout */}
      <div style={{display:'flex', minHeight:'68vh', border:'1px solid #EDEAF4', borderRadius:16, overflow:'hidden', background:'white'}}>

        {/* LEFT PANEL */}
        <div style={{width:230, flexShrink:0, borderRight:'1px solid #EDEAF4', display:'flex', flexDirection:'column', background:'white'}}>
          {/* Study Guide heading */}
          <div style={{padding:'14px 14px 10px', borderBottom:'1px solid #EDEAF4'}}>
            <p style={{fontSize:13, fontWeight:700, color:'#302C41', margin:'0 0 10px', letterSpacing:'-0.1px'}}>Study Guide</p>
            <p style={{fontSize:10, fontWeight:700, color:'#9991BF', textTransform:'uppercase', letterSpacing:'0.06em', margin:0}}>Lectures</p>
          </div>
          {/* Flat lecture list */}
          <div style={{flex:1, overflowY:'auto', padding:'6px 0'}}>
            {nonErrLecs.map((lec) => {
              const mastery = getMastery(lec);
              const isSelected = selLecId === lec.id;
              const isReady = lec.status === 'ready';
              const statusIcon = lec.status === 'processing'
                ? null
                : mastery >= 70 ? '✅' : mastery > 0 ? '⚠️' : '□';
              return (
                <div key={lec.id}
                  onClick={() => { if (isReady) { setSelLecId(lec.id); setCardIdx(0); setFlipped(false); setDeckDone(false); } }}
                  style={{
                    padding:'8px 14px', cursor: isReady ? 'pointer' : 'default',
                    display:'flex', alignItems:'center', gap:8,
                    background: isSelected ? '#FFF3E8' : 'transparent',
                    borderLeft: isSelected ? '3px solid #EB7100' : '3px solid transparent',
                    opacity: lec.status === 'pending' ? 0.5 : 1,
                    transition:'background 0.12s'
                  }}>
                  <span style={{fontSize:12, flexShrink:0, lineHeight:1, width:16, textAlign:'center'}}>
                    {lec.status === 'processing' ? <Spinner size={10} stroke="1.5px" /> : statusIcon}
                  </span>
                  <span style={{fontSize:12, fontWeight: isSelected ? 600 : 400,
                    color: isSelected ? '#EB7100' : '#302C41',
                    flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                    {lec.label}
                  </span>
                </div>
              );
            })}
            {/* Failed lectures section */}
            {lectures.filter(l => l.status === 'error').length > 0 && (
              <div style={{borderTop:'1px solid #EDEAF4', paddingTop:8, marginTop:4}}>
                <p style={{fontSize:10, fontWeight:700, color:'#dc2626', textTransform:'uppercase', letterSpacing:'0.06em',
                  padding:'4px 14px 6px', margin:0}}>Failed</p>
                {lectures.filter(l => l.status === 'error').map(lec => (

                    border:'1px solid #fee2e2', background:'#fff5f5'}}>
                    <span style={{fontSize:11, fontWeight:500, color:'#991b1b', display:'block',
                      overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', marginBottom:4}}>
                      {lec.label}
                    </span>
                    <button onClick={() => regenerateLecture(lec.id)}

                        border:'1px solid #fca5a5', borderRadius:6, padding:'3px 8px', cursor:'pointer', width:'100%'}}>
                      ↺ Regenerate
                    </button>
                  </div>

              </div>

          </div>
        </div>

        <div style={{flex:1, overflowY:'auto', padding:'28px 32px'}}>

                      <p style={{fontSize:12, color:'rgba(255,255,255,0.5)', margin:0}}>
                        {getMastery(nextLec) === 0
                          ? 'Not started yet'
                          : `${getMastery(nextLec)}% mastery · keep going to reach 70%`}
                      </p>
                    </>
                  ) : (
                    <p style={{fontSize:15, fontWeight:600, color:'rgba(255,255,255,0.6)', margin:0}}>
                      No lectures ready yet.
                    </p>
                  )}
                </div>
                {!generating && nextLec && (
                  <button onClick={() => { setSelLecId(nextLec.id); setCardIdx(0); setFlipped(false); setDeckDone(false); }}
                    style={{flexShrink:0, background:'#EB7100', color:'white', border:'none',
                      borderRadius:10, padding:'12px 22px', fontSize:13, fontWeight:700,

              {/* ── Course Readiness stat ── */}
              <div style={{borderRadius:12, border:'1px solid #EDEAF4', padding:'14px 18px',
                background:'white', marginBottom:14}}>
                <p style={{fontSize:22, fontWeight:800, color:'#302C41', margin:'0 0 3px', lineHeight:1}}>
                  {overallMastery}%
                </p>
                <p style={{fontSize:10, fontWeight:700, color:'#9991BF', textTransform:'uppercase',
                  letterSpacing:'0.05em', margin:'0 0 8px'}}>Course Readiness</p>
                <div style={{height:4, borderRadius:2, background:'#EDEAF4', overflow:'hidden'}}>
                  <div style={{height:'100%', borderRadius:2, background:'#EB7100',
                    width:`${overallMastery}%`, transition:'width 0.4s ease'}}></div>
                </div>
              </div>

              {/* ── Secondary actions row ── */}
              <div style={{display:'flex', gap:10}}>

                {/* Professor Assigned */}
                {profQuizzes.length > 0 && (
                  <div style={{flex:1, borderRadius:12, border:'1px solid #EDEAF4',
                    padding:'14px 18px', background:'white',
                    display:'flex', alignItems:'center', justifyContent:'space-between', gap:12}}>
                    <div style={{minWidth:0}}>
                      <p style={{fontSize:10, fontWeight:700, color:'#9991BF', textTransform:'uppercase',
                        letterSpacing:'0.06em', margin:'0 0 3px'}}>Professor Assigned</p>
                      <p style={{fontSize:13, fontWeight:700, color:'#302C41', margin:'0 0 1px',
                        overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                        {profQuizzes[0].title}
                      </p>
                      <p style={{fontSize:11, color:'#9991BF', margin:0}}>
                        {profQuizzes[0].questions} questions · {profQuizzes[0].shared}
                      </p>
                    </div>
                    <button style={{flexShrink:0, fontSize:12, fontWeight:700, color:'white',
                      background:'#302C41', border:'none', borderRadius:8,
                      padding:'8px 16px', cursor:'pointer'}}>
                      Start →
                    </button>
                  </div>
                )}

                {/* Full Course Quiz — only when lectures are ready */}
                {!generating && readyLecs.length >= 2 && (
                  <div style={{flex:1, borderRadius:12, border:'1px solid #EDEAF4',
                    padding:'14px 18px', background:'white',
                    display:'flex', alignItems:'center', justifyContent:'space-between', gap:12}}>
                    <div>
                      <p style={{fontSize:10, fontWeight:700, color:'#9991BF', textTransform:'uppercase',
                        letterSpacing:'0.06em', margin:'0 0 3px'}}>Course Quiz</p>
                      <p style={{fontSize:13, fontWeight:700, color:'#302C41', margin:'0 0 1px'}}>
                        Full Course Quiz
                      </p>
                      <p style={{fontSize:11, color:'#9991BF', margin:0}}>
                        {readyLecs.length} lectures · all topics
                      </p>
                    </div>
                    <button onClick={generateCourseQuiz} disabled={courseQuizLoading}
                      style={{flexShrink:0, fontSize:12, fontWeight:700, color:'white',
                        background:'#302C41', border:'none', borderRadius:8,
                        padding:'8px 16px', cursor: courseQuizLoading ? 'default' : 'pointer',
                        opacity: courseQuizLoading ? 0.6 : 1}}>
                      {courseQuizLoading ? 'Generating…' : 'Take →'}
                    </button>
                  </div>
                )}
              </div>

              {/* Full Course Quiz panel — expands below when active */}
              {courseQuiz && (
                <div style={{marginTop:14, border:'1.5px solid #FFBC80', borderRadius:12,
                  padding:'16px 20px', background:'#FFF3E8'}}>
                  <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12}}>
                    <p style={{fontSize:13, fontWeight:700, color:'#9a3412', margin:0}}>📝 Full Course Quiz</p>
                    <button onClick={() => { setCourseQuiz(null); setCourseQuizAnswers([]); setCourseQuizSubmitted(false); }}
                      style={{fontSize:12, color:'#EB7100', background:'none', border:'none', cursor:'pointer', fontWeight:600}}>
                      Close ✕
                    </button>
                  </div>
                  <QuizUI quiz={courseQuiz} answers={courseQuizAnswers} submitted={courseQuizSubmitted}
                    onAnswer={(qi, oi) => { const a = [...courseQuizAnswers]; a[qi] = oi; setCourseQuizAnswers(a); }}
                    onSubmit={() => setCourseQuizSubmitted(true)}
                    onReset={() => { setCourseQuizAnswers(new Array(courseQuiz.questions.length).fill(null)); setCourseQuizSubmitted(false); }} />
                </div>
              )}

              {/* ── Study Schedule Panel (tied to guide topics) ─────────────────── */}
              {(() => {
                if (!curCourse) return null;
                const readyGuideMap = { [courseId]: lectures.filter(l => l.status === 'ready') };
                const schedule = buildStudySchedule([curCourse], readyGuideMap, profile);
                if (schedule.length === 0 && readyLecs.length === 0) return null;

                const profileTarget = parseGoalPct(profile?.gradeGoal);
                const activeTarget = curCourse.courseGoal ?? profileTarget;
                const gradeGap = calcGradeNeeded(curCourse, activeTarget);
                const daysLeft = daysUntil(curCourse.finalDate);
                const maxHours = parseMaxHours(profile?.studyHours || '4-5');

                // Group schedule rows by date, show next 14 days only
                const toDateStr = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                const cutoff = new Date(TODAY); cutoff.setDate(TODAY.getDate() + 14);
                const cutoffStr = toDateStr(cutoff);
                const upcoming = schedule.filter(r => r.date >= toDateStr(TODAY) && r.date <= cutoffStr);

                // Compute totals for the summary bar
                const totalTopicsLeft = readyLecs.reduce((s, l) => {
                  const count = (l.guide?.topics?.length || 0) - Object.values(l.understood || {}).filter(Boolean).length;
                  return s + Math.max(0, count);
                }, 0);

                // Group upcoming sessions by date
                const byDate = {};
                upcoming.forEach(r => { if (!byDate[r.date]) byDate[r.date] = []; byDate[r.date].push(r); });

                const fmtDate = (ds) => {
                  const d = new Date(ds + 'T12:00:00');
                  const isToday = ds === toDateStr(TODAY);
                  const isTomorrow = ds === toDateStr(new Date(TODAY.getTime() + 86400000));
                  if (isToday) return 'Today';
                  if (isTomorrow) return 'Tomorrow';
                  return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
                };

                const URGENCY_COLOR = gradeGap > 20 ? '#D62B2B' : gradeGap > 0 ? '#EB7100' : '#1E8A4A';

                return (
                  <div style={{marginTop:16}}>
                    {/* Section header */}
                    <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10}}>
                      <div style={{display:'flex', alignItems:'center', gap:8}}>
                        <p style={{fontSize:13, fontWeight:700, color:'#302C41', margin:0}}>📅 Study Schedule</p>
                        {readyLecs.length > 0 && (
                          <span style={{fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:99,
                            background:'#FFF3E8', color:'#EB7100', border:'1px solid #FFBC80'}}>
                            Tied to your guide
                          </span>
                        )}
                      </div>
                      {curCourse.finalDate && (
                        <span style={{fontSize:11, fontWeight:700, color:'#EF4444',
                          background:'#FEF2F2', border:'1px solid #FECACA',
                          borderRadius:8, padding:'3px 10px'}}>
                          🎓 Final: {new Date(curCourse.finalDate+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})} · {daysLeft} days
                        </span>
                      )}
                    </div>

                    {/* Smart summary bar */}
                    <div style={{borderRadius:12, background:'#F7F6FA', border:'1px solid #EDEAF4',
                      padding:'12px 16px', marginBottom:12, display:'flex', gap:16, flexWrap:'wrap'}}>
                      <div style={{display:'flex', flexDirection:'column', gap:2}}>
                        <span style={{fontSize:11, fontWeight:700, color:URGENCY_COLOR}}>
                          {gradeGap > 100 ? '⚠️ Stretch goal' : gradeGap > 0 ? `Need ${gradeGap}% on final` : '✓ Goal secured'}
                        </span>
                        <span style={{fontSize:10, color:'#9991BF'}}>Current {curCourse.currentGrade}% → Goal {activeTarget}%</span>
                      </div>
                      <div style={{width:'1px', background:'#EDEAF4', flexShrink:0}} />
                      <div style={{display:'flex', flexDirection:'column', gap:2}}>
                        <span style={{fontSize:11, fontWeight:700, color:'#302C41'}}>{totalTopicsLeft} topics left</span>
                        <span style={{fontSize:10, color:'#9991BF'}}>from your study guide</span>
                      </div>
                      <div style={{width:'1px', background:'#EDEAF4', flexShrink:0}} />
                      <div style={{display:'flex', flexDirection:'column', gap:2}}>
                        <span style={{fontSize:11, fontWeight:700, color:'#302C41'}}>{maxHours}h/day</span>
                        <span style={{fontSize:10, color:'#9991BF'}}>study target</span>
                      </div>
                      <div style={{width:'1px', background:'#EDEAF4', flexShrink:0}} />
                      <div style={{display:'flex', flexDirection:'column', gap:2}}>
                        <span style={{fontSize:11, fontWeight:700, color:'#302C41'}}>{curCourse.finalWeight}% weight</span>
                        <span style={{fontSize:10, color:'#9991BF'}}>of final grade</span>
                      </div>
                    </div>

                    {/* Day-by-day schedule */}
                    {schedule.length === 0 ? (
                      <div style={{borderRadius:12, border:'1.5px dashed #EDEAF4', padding:'24px 16px',
                        textAlign:'center', color:'#9991BF', fontSize:12}}>
                        {readyLecs.length === 0
                          ? 'Generate your study guide above to get a personalized study schedule.'
                          : 'Complete onboarding to get a day-by-day study plan tailored to your schedule.'}
                      </div>
                    ) : (
                      <div style={{display:'flex', flexDirection:'column', gap:6}}>
                        {Object.entries(byDate).slice(0, 7).map(([ds, rows]) => {
                          const isToday = ds === toDateStr(TODAY);
                          return (
                            <div key={ds} style={{
                              borderRadius:10,
                              border: isToday ? '1.5px solid #FFBC80' : '1px solid #EDEAF4',
                              background: isToday ? '#FFFBF5' : 'white',
                              overflow:'hidden'
                            }}>
                              <div style={{
                                padding:'7px 14px',
                                background: isToday ? '#FFF3E8' : '#F7F6FA',
                                borderBottom:'1px solid #EDEAF4',
                                display:'flex', alignItems:'center', justifyContent:'space-between'
                              }}>
                                <span style={{fontSize:11, fontWeight:700,
                                  color: isToday ? '#EB7100' : '#302C41'}}>
                                  {isToday ? '📌 ' : ''}{fmtDate(ds)}
                                </span>
                                <span style={{fontSize:10, color:'#9991BF'}}>
                                  {rows.reduce((s,r) => s + r.hours, 0)}h planned
                                </span>
                              </div>

                                <div key={ri} style={{
                                  padding:'8px 14px',
                                  display:'flex', alignItems:'center', gap:10,
                                  borderBottom: ri < rows.length - 1 ? '1px solid #F5F4F9' : 'none'
                                }}>
                                  <div style={{
                                    width:28, height:28, borderRadius:8,
                                    background:'#FFF3E8', flexShrink:0,
                                    display:'flex', alignItems:'center', justifyContent:'center',
                                    fontSize:13
                                  }}>📚</div>
                                  <div style={{flex:1, minWidth:0}}>
                                    <p style={{fontSize:12, fontWeight:600, color:'#302C41', margin:'0 0 1px',

                                    </p>
                                    <p style={{fontSize:10, color:'#9991BF', margin:0}}>
                                      {[row.timeLabel, `${row.hours}h`].filter(Boolean).join(' · ')}
                                    </p>
                                  </div>
                                  {row.timeLabel && (
                                    <span style={{fontSize:10, fontWeight:600, color:'#EB7100',
                                      background:'#FFF3E8', border:'1px solid #FFBC80',
                                      borderRadius:6, padding:'2px 8px', flexShrink:0, whiteSpace:'nowrap'}}>
                                      {row.timeLabel}
                                    </span>
                                  )}
                                </div>
                              ))}
                            </div>
                          );
                        })}
                        {Object.keys(byDate).length > 7 && (
                          <p style={{fontSize:11, color:'#9991BF', textAlign:'center', margin:'4px 0 0', padding:'4px'}}>
                            + {Object.keys(byDate).length - 7} more study days through your final · view full plan on the Dashboard calendar
                          </p>

                        {curCourse.finalDate && (

                      </div>

              {/* Back link */}

              <div style={{marginBottom:16}}>
